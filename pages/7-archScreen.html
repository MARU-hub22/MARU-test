<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
:root{--bg:#e8e8e8;--sd:#b8b8b8;--sl:#ffffff;--t1:#2c2c2c;--t2:#666666;--t3:#999999;--acc:#E8705A}
body,*{transition:background-color 1.5s ease,color 1.5s ease,box-shadow 1.5s ease,border-color 1.5s ease,fill 1.5s ease}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;padding:0;margin:0}
.wrap{max-width:100%;margin:0 auto;padding:16px;padding-bottom:calc(32px + env(safe-area-inset-bottom))}
.card{background:var(--bg);border-radius:20px;box-shadow:6px 6px 12px var(--sd),-6px -6px 12px var(--sl);padding:20px;margin-bottom:16px}
.screen{display:none}
.screen.active{display:block}
#splash{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;cursor:pointer;-webkit-tap-highlight-color:transparent}
.spl-logo{font-size:12vw;font-weight:700;color:var(--bg);letter-spacing:8px;pointer-events:none;text-shadow:-1px -1px 1px rgba(0,0,0,0.15),1px 1px 2px rgba(255,255,255,0.7);filter:brightness(0.96) contrast(1.06)}
.spl-over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;color:var(--t2);letter-spacing:2px;opacity:0;animation:fadeIn 2s ease .5s forwards;pointer-events:none}
.spl-foot{position:absolute;bottom:calc(30px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;color:var(--t3);font-size:11px;opacity:0;animation:fadeIn 2s ease 1.5s forwards;pointer-events:none}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
#startScreen.active{display:flex;flex-direction:column;justify-content:center;min-height:100vh;padding:16px;padding-bottom:calc(32px + env(safe-area-inset-bottom));overflow-y:auto}
.logo-sm{font-size:16px;font-weight:700;letter-spacing:4px;color:var(--bg);text-align:left;margin-bottom:4px;text-transform:uppercase;text-shadow:-1px -1px 1px rgba(0,0,0,0.12),1px 1px 2px rgba(255,255,255,0.6);filter:brightness(0.96);padding:calc(8px + env(safe-area-inset-top)) 0 8px 8px}
.hero{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.hero-img{width:60px;height:60px;border-radius:50%;object-fit:cover;filter:grayscale(1);box-shadow:inset -3px -3px 8px rgba(0,0,0,0.4),inset 3px 3px 8px rgba(255,255,255,0.3),4px 4px 8px var(--sd),-5px -5px 10px var(--sl);transform:scale(1.08);position:relative}
.hero-lbl{font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.hero-ttl{font-size:20px;font-weight:700;color:#4a4a4a!important;filter:none!important;text-shadow:none!important;-webkit-text-fill-color:#4a4a4a!important}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--sd),transparent);margin:14px 0}
.sub-txt{text-align:center;font-size:13px;color:var(--t2)}
.energy-icons{display:flex;justify-content:space-between;flex-wrap:nowrap;gap:4px;padding:0 4px}
.energy-icon{text-align:center;flex:1;min-width:0}
.energy-ico-circle{width:38px;height:38px;border-radius:50%;background:var(--bg);box-shadow:inset 3px 3px 6px var(--sd),inset -4px -4px 8px var(--sl);display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.energy-ico-circle svg{width:16px;height:16px;stroke:var(--t3);stroke-width:1.5;fill:none}
.energy-lbl{font-size:9px;color:var(--t3)}
.info-row{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:13px;color:var(--t2);border-bottom:1px solid rgba(0,0,0,.03)}
.info-row:last-child{border:none}
.info-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:3px 3px 6px var(--sd),-5px -5px 10px var(--sl)}
.info-ico svg{width:13px;height:13px;stroke:var(--acc);stroke-width:2;fill:none}
.btn{width:100%;padding:16px;background:var(--acc);color:#ffffff;border:none;border-radius:16px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;box-shadow:6px 6px 12px var(--sd),-8px -8px 16px var(--sl);transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{transform:translateY(-2px);box-shadow:8px 8px 16px var(--sd),-12px -12px 20px var(--sl)}
.btn:active{transform:scale(.98);box-shadow:inset 4px 4px 8px rgba(0,0,0,.2)}
.btn-sec{background:var(--bg);color:var(--acc)}
.btn-sec:hover{box-shadow:8px 8px 16px var(--sd),-10px -10px 18px var(--sl)}
.btn-sec:active{box-shadow:inset 4px 4px 8px var(--sd),inset -5px -5px 10px var(--sl)}
#offerScreen.active{display:flex;flex-direction:column;min-height:100vh;padding:calc(8px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));overflow-y:auto}
#privacyScreen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);padding:calc(48px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));overflow-y:auto;z-index:300}
#privacyScreen.active{display:block}
.privacy-back{position:fixed;top:calc(16px + env(safe-area-inset-top));right:16px;width:44px;height:44px;border-radius:12px;border:none;background:var(--bg);box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:301;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media (hover: hover){.privacy-back:hover{transform:translateY(-2px);box-shadow:6px 6px 12px var(--sd),-4px -4px 8px var(--sl)}}
.privacy-back:active{box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl);transform:scale(.98)}
.privacy-back svg{width:18px;height:18px;stroke:var(--t3);stroke-width:2;fill:none}
.privacy-link{color:var(--acc);text-decoration:underline;cursor:pointer;font-weight:500}
.offer-box{background:var(--bg);border-radius:20px;box-shadow:inset 6px 6px 12px var(--sd),inset -8px -8px 16px var(--sl);padding:20px;margin-bottom:16px;max-height:50vh;overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.offer-box::-webkit-scrollbar{width:6px}
.offer-box::-webkit-scrollbar-track{background:transparent}
.offer-box::-webkit-scrollbar-thumb{background:var(--sd);border-radius:3px}
.offer-box{scrollbar-width:thin;scrollbar-color:var(--sd) transparent}
.offer-ttl{font-size:18px;font-weight:700;margin-bottom:12px;text-align:center;margin-top:16px}
.offer-txt{font-size:12px;line-height:1.6;color:var(--t2);margin-bottom:10px}
.offer-txt strong{color:var(--t1);font-weight:600}
.chk-row{display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg);border-radius:16px;box-shadow:5px 5px 10px var(--sd),-7px -7px 14px var(--sl);margin-bottom:16px;cursor:pointer;transition:all .2s;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;position:relative;z-index:1000}
.chk-row:active{box-shadow:inset 3px 3px 6px var(--sd),inset -4px -4px 8px var(--sl)}
.chk-box{width:24px;height:24px;min-width:24px;border-radius:6px;box-shadow:inset 3px 3px 6px var(--sd),inset -4px -4px 10px var(--sl);display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk-row.checked .chk-box{background:var(--acc);box-shadow:3px 3px 6px var(--sd),-4px -4px 8px var(--sl)}
.chk-box svg{width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .2s}
.chk-row.checked .chk-box svg{opacity:1}
.chk-lbl{font-size:13px;line-height:1.4;color:var(--t2);flex:1}
.chk-row.checked .chk-lbl{color:var(--t1)}
#questionScreen.active{display:flex;flex-direction:column;justify-content:center;min-height:calc(100vh - 32px)}
.q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.q-prog{display:flex;align-items:center;gap:12px}
.progress-ring{width:50px;height:50px;position:relative;border-radius:50%;background:var(--bg);box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl);display:flex;align-items:center;justify-content:center}
.progress-ring svg{transform:rotate(-90deg);width:42px;height:42px}
.progress-ring-bg{fill:none;stroke:var(--sd);stroke-width:2}
.progress-ring-fill{fill:none;stroke:var(--acc);stroke-width:2;stroke-linecap:round;transition:stroke-dashoffset .3s}
.progress-text{position:absolute;font-size:10px;font-weight:700;color:var(--acc)}
.q-cnt{font-size:12px;color:var(--t3)}
.btn-back{width:44px;height:44px;border-radius:12px;border:none;background:var(--bg);box-shadow:5px 5px 10px var(--sd),-6px -6px 12px var(--sl);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-back:hover{transform:translateY(-2px);box-shadow:6px 6px 12px var(--sd),-4px -4px 8px var(--sl)}
.btn-back:active{box-shadow:inset 4px 4px 8px var(--sd)}
.btn-back svg{width:14px;height:14px;stroke:var(--t2);stroke-width:2;fill:none}
.btn-back.hide{visibility:hidden}
.q-txt{font-size:17px;font-weight:600;line-height:1.5;background:var(--bg);border-radius:20px;box-shadow:8px 8px 16px var(--sd),-10px -10px 18px var(--sl);padding:20px;margin-bottom:16px}
.ans-list{display:flex;flex-direction:column;gap:10px;padding-bottom:24px}
.ans{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:14px;background:var(--bg);cursor:pointer;box-shadow:5px 5px 10px var(--sd),-7px -7px 14px var(--sl);transition:all .15s}
.ans:hover{transform:translateY(-1px);box-shadow:6px 6px 12px var(--sd),-5px -5px 10px var(--sl)}
.ans:active{box-shadow:inset 3px 3px 6px var(--sd)}
.ans.sel{box-shadow:inset 4px 4px 8px var(--sd)}
.ans-rad{width:20px;height:20px;min-width:20px;border-radius:50%;box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 6px var(--sl);display:flex;align-items:center;justify-content:center;margin-top:2px}
.ans.sel .ans-rad{background:var(--acc);box-shadow:2px 2px 4px var(--sd),-3px -3px 5px var(--sl)}
.ans.sel .ans-rad::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%}
.ans-txt{font-size:13px;line-height:1.5;color:var(--t2)}
.ans.sel .ans-txt{color:var(--t1)}
.res-photo{width:120px;height:120px;border-radius:50%;object-fit:cover;filter:grayscale(1);box-shadow:5px 5px 10px var(--sd),-6px -6px 12px var(--sl);display:block;margin:20px auto 16px}
.res-head{text-align:center;margin-bottom:16px}
.res-lbl{font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;margin-top:0}
.res-name{font-size:26px;font-weight:700;margin-bottom:4px}
.res-combo{font-size:13px;color:var(--t3);letter-spacing:1px}
.valid-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:500;margin-bottom:8px;box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl)}
.valid-badge.high{color:#27ae60}
.valid-badge.med{color:#f39c12}
.valid-badge.low{color:#e74c3c}
.sec-ttl{font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{width:26px;font-size:11px;font-weight:600;color:var(--t2)}
.bar-track{flex:1;height:10px;border-radius:5px;background:var(--bg);box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl);padding:2px}
.bar-fill{height:100%;background:var(--acc);border-radius:3px;transition:width 1s ease}
.bar-pct{width:42px;font-size:12px;font-weight:600;text-align:right}
.top-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.03)}
.top-row:last-child{border:none}
.top-name{font-size:13px}
.top-lvl{font-size:11px;color:var(--t3);padding:5px 10px;border-radius:8px;box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl)}
.warn-box{padding:12px;border-radius:12px;margin-bottom:12px;box-shadow:inset 3px 3px 6px var(--sd),inset -4px -4px 8px var(--sl)}
.warn-txt{font-size:12px;color:var(--t2);line-height:1.5}
.share-hint{display:none;text-align:center;font-size:14px;color:var(--acc);margin-top:12px;padding:12px 20px;background:rgba(76,175,80,0.1);border-radius:12px;font-weight:500}
#archScreen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);padding:calc(48px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));overflow-y:auto;z-index:200}
#archScreen.active{display:block}
.arch-photo-cont{display:flex;justify-content:center;margin-bottom:40px;margin-top:32px}
.arch-logo{font-size:40px;font-weight:800;letter-spacing:6px;color:var(--bg);text-shadow:1px 1px 2px var(--sl),-1px -1px 2px var(--sd);background:linear-gradient(135deg,#b0b0b0 0%,#d0d0d0 100%);-webkit-background-clip:text;background-clip:text;text-align:center;margin-top:20px;margin-bottom:20px}
.arch-photo{width:35%;aspect-ratio:3/4;border-radius:16px;object-fit:cover;filter:grayscale(100%);box-shadow:4px 4px 8px var(--sd),-2px -2px 4px var(--sl);position:relative}
.arch-photo::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:16px;background:radial-gradient(ellipse at center,transparent 0%,rgba(0,0,0,0.05) 100%);pointer-events:none}
.arch-header{margin-bottom:20px;margin-top:16px}
.arch-label{text-align:center;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:2px}
.arch-title{text-align:center;font-size:28px;font-weight:700;color:var(--t1);margin-bottom:32px}
.acc-btn{width:100%;background:var(--bg);border:none;border-radius:16px;padding:16px 18px;margin-bottom:12px;font-size:15px;font-weight:500;color:var(--t2);cursor:pointer;box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl);display:flex;justify-content:space-between;align-items:center;font-family:'Inter',sans-serif;gap:12px;transition:all .2s}
@media (hover: hover){.acc-btn:hover{transform:translateY(-1px);box-shadow:6px 6px 12px var(--sd),-4px -4px 8px var(--sl)}}
.acc-btn:active{transform:scale(.98)}
.acc-btn.active{box-shadow:inset 3px 3px 6px var(--sd),inset -4px -4px 8px var(--sl)}
.acc-circle{width:18px;height:18px;min-width:18px;border-radius:50%;background:var(--bg);box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl);transition:all .3s;position:relative}
.acc-btn.active .acc-circle{background:var(--acc);box-shadow:2px 2px 4px var(--sd),-3px -3px 5px var(--sl)}
.acc-btn.active .acc-circle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:var(--bg);border-radius:50%;box-shadow:inset 1px 1px 2px var(--sd),inset -1px -1px 2px var(--sl)}
.acc-btn-text{flex:1;text-align:left}
.acc-arrow{width:16px;height:16px;transition:transform .3s;color:var(--t3)}
.acc-btn.active .acc-arrow{transform:rotate(180deg)}
.acc-content{max-height:0;overflow:hidden;background:var(--bg);border-radius:16px;margin-top:-8px;margin-bottom:12px;box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl);transition:max-height .4s ease}
.acc-content.active{max-height:3000px}
.acc-inner{padding:16px 20px 20px;color:var(--t2);font-size:15px;line-height:1.6}
#introScreen.active{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:calc(24px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));overflow-y:auto;overflow-x:hidden}
.intro-logo{font-size:40px;font-weight:800;letter-spacing:6px;color:var(--bg);text-shadow:-1px -1px 1px rgba(0,0,0,0.15),1px 1px 2px rgba(255,255,255,0.7);filter:brightness(0.96) contrast(1.06);text-align:center;margin-top:0;margin-bottom:4px}
.intro-subtitle{font-size:11px;color:var(--t3);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-top:0;margin-bottom:16px}
.intro-greeting{font-size:14px;color:var(--t3);text-align:left;margin-bottom:16px;font-weight:400}
.intro-content-block{width:100%;max-width:340px;background:var(--bg);border-radius:20px;padding:20px 20px;box-shadow:inset 6px 6px 12px var(--sd),inset -8px -8px 16px var(--sl);margin-bottom:16px}
.intro-text-content{font-size:14px;color:var(--t1);line-height:1.7}
.intro-text-content p{margin-bottom:16px}
.intro-text-content p:last-child{margin-bottom:0}
.intro-highlight{color:var(--acc);font-weight:600}
.intro-authors{font-size:13px;color:var(--t2);font-style:italic;margin-top:20px;padding-top:16px;border-top:1px solid rgba(0,0,0,0.05)}
.intro-stat{font-size:15px;font-weight:600;color:var(--acc)}
.intro-more-text{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.intro-more-text.expanded{max-height:2000px}
.intro-read-more-wrapper{text-align:center;margin:24px 0 20px 0}
.intro-read-more-btn{display:inline-block;padding:8px 16px;font-size:13px;font-weight:600;color:var(--acc);background:var(--bg);border:none;border-radius:8px;cursor:pointer;box-shadow:2px 2px 4px var(--sd),-3px -3px 5px var(--sl);transition:all 0.2s ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.intro-read-more-btn:hover{transform:translateY(-1px);box-shadow:3px 3px 6px var(--sd),-3px -3px 5px var(--sl)}
.intro-read-more-btn:active{transform:translateY(0);box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl)}
.payment-back{position:fixed;top:calc(16px + env(safe-area-inset-top));right:16px;width:44px;height:44px;border-radius:12px;border:none;background:var(--bg);box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:301;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media (hover: hover){.payment-back:hover{transform:translateY(-2px);box-shadow:6px 6px 12px var(--sd),-4px -4px 8px var(--sl)}}
.payment-back:active{box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl);transform:scale(.98)}
.payment-back svg{width:18px;height:18px;stroke:var(--t3);stroke-width:2;fill:none}
.arch-back{position:fixed;top:calc(16px + env(safe-area-inset-top));right:16px;width:44px;height:44px;border-radius:12px;border:none;background:var(--bg);box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:201;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media (hover: hover){.arch-back:hover{transform:translateY(-2px);box-shadow:6px 6px 12px var(--sd),-4px -4px 8px var(--sl)}}
.arch-back:active{box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl);transform:scale(.98)}
.arch-back svg{width:18px;height:18px;stroke:var(--t3);stroke-width:2;fill:none}
.intro-back{position:fixed;top:calc(16px + env(safe-area-inset-top));right:16px;width:44px;height:44px;border-radius:12px;border:none;background:var(--bg);box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:201;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media (hover: hover){.intro-back:hover{transform:translateY(-2px);box-shadow:6px 6px 12px var(--sd),-4px -4px 8px var(--sl)}}
.intro-back:active{box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl);transform:scale(.98)}
.intro-back svg{width:18px;height:18px;stroke:var(--t3);stroke-width:2;fill:none}
#paymentScreen.active{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:0 20px calc(40px + env(safe-area-inset-bottom));overflow-y:auto;position:relative}
.payment-logo{font-size:40px;font-weight:800;letter-spacing:6px;color:var(--bg);text-shadow:1px 1px 2px var(--sl),-1px -1px 2px var(--sd);background:linear-gradient(135deg,#b0b0b0 0%,#d0d0d0 100%);-webkit-background-clip:text;background-clip:text;margin-bottom:40px;text-align:center}
.payment-title{font-size:20px;font-weight:600;margin-bottom:4px;color:var(--t2);text-align:center}
.payment-subtitle{font-size:13px;color:var(--t2);margin-bottom:28px;line-height:1.5;text-align:center;max-width:340px}
.region-switch{display:flex;gap:8px;margin-bottom:24px;background:var(--bg);padding:4px;border-radius:12px;box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl);width:100%;max-width:340px;position:relative;z-index:10}
.region-btn{flex:1;padding:10px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--t3);transition:all 0.2s ease;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.region-btn.active{background:var(--bg);color:var(--acc);box-shadow:2px 2px 4px var(--sd),-3px -3px 5px var(--sl)}
.price-block{background:var(--bg);padding:20px 24px 18px;border-radius:16px;margin-bottom:24px;box-shadow:6px 6px 12px var(--sd),-4px -4px 8px var(--sl);width:100%;max-width:340px;text-align:center;position:relative;cursor:pointer;transition:all 0.2s ease;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;z-index:5;min-height:120px}
.price-block:hover{transform:translateY(-2px);box-shadow:8px 8px 16px var(--sd),-10px -10px 18px var(--sl)}
.price-block:active{transform:scale(0.98);box-shadow:inset 3px 3px 6px var(--sd),inset -4px -4px 8px var(--sl)}
.info-icon{position:absolute;top:12px;right:16px;width:18px;height:18px;border-radius:50%;background:var(--bg);box-shadow:2px 2px 4px var(--sd),-3px -3px 5px var(--sl);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--t3);font-family:serif;pointer-events:none}
.price-label{font-size:10px;color:var(--t3);margin-bottom:16px;letter-spacing:0.5px;text-transform:uppercase;font-weight:500;pointer-events:none}
.old-price{font-size:13px;color:var(--t3);text-decoration:line-through;opacity:0;transform:translateY(-5px);transition:opacity 0.3s ease,transform 0.3s ease;margin-bottom:6px;font-family:'Roboto Mono',monospace;height:18px;pointer-events:none}
.price-block:active .old-price{opacity:1;transform:translateY(0)}
.price-amount{font-size:32px;font-weight:400;color:var(--acc);letter-spacing:0;font-family:'Roboto Mono',monospace;line-height:1.1;display:inline-flex;align-items:baseline;gap:2px;pointer-events:none}
.price-amount .currency{font-size:18px;font-weight:300;opacity:0.85;pointer-events:none}
.benefits-block{width:100%;max-width:340px;margin-bottom:24px;background:var(--bg);border-radius:16px;padding:16px;box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl)}
.benefit-item{display:flex;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.03)}
.benefit-item:last-child{border-bottom:none;padding-bottom:0}
.benefit-icon{width:16px;height:16px;min-width:16px;margin-right:12px;margin-left:4px;position:relative}
.benefit-icon::after{content:'';position:absolute;left:5px;top:2px;width:4px;height:8px;border:solid var(--t3);border-width:0 2px 2px 0;transform:rotate(45deg)}
.benefit-text{font-size:13px;color:var(--t2);line-height:1.4;flex:1}
.btn-payment-primary{width:100%;max-width:340px;padding:14px 20px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:all 0.2s;background:var(--bg);color:var(--acc);box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-payment-primary:hover{transform:translateY(-2px);box-shadow:6px 6px 12px var(--sd),-4px -4px 8px var(--sl)}
.btn-payment-primary:active{transform:translateY(0);box-shadow:inset 3px 3px 6px var(--sd),inset -4px -4px 8px var(--sl)}
.btn-payment-secondary{width:100%;max-width:340px;padding:14px 20px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:all 0.2s;background:var(--bg);color:var(--t2);box-shadow:3px 3px 6px var(--sd),-3px -3px 5px var(--sl);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-payment-secondary:hover{transform:translateY(-2px);box-shadow:5px 5px 10px var(--sd),-3px -3px 5px var(--sl)}
.btn-payment-secondary:active{transform:translateY(0);box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl)}
.payment-footer{font-size:10px;color:var(--t3);text-align:center;margin-top:16px;line-height:1.5}
#customPrompt{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(232,232,232,0.7);z-index:500;align-items:center;justify-content:center}
#customPrompt.active{display:flex}
.prompt-box{background:var(--bg);border-radius:20px;padding:24px;width:90%;max-width:320px;box-shadow:6px 6px 12px var(--sd),-8px -8px 16px var(--sl)}
.prompt-title{font-size:16px;font-weight:600;color:var(--t2);margin-bottom:16px;text-align:center}
.prompt-input{width:100%;padding:12px 16px;border:none;border-radius:12px;font-size:15px;background:var(--bg);box-shadow:inset 3px 3px 6px var(--sd),inset -4px -4px 8px var(--sl);margin-bottom:16px;font-family:'Inter',sans-serif;color:var(--t2)}
.prompt-input:focus{outline:none;box-shadow:inset 4px 4px 8px var(--sd),inset -5px -5px 10px var(--sl)}
.prompt-buttons{display:flex;gap:12px}
.prompt-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.prompt-btn-cancel{background:var(--bg);color:var(--t3);box-shadow:3px 3px 6px var(--sd),-3px -3px 5px var(--sl)}
.prompt-btn-cancel:active{box-shadow:inset 2px 2px 4px var(--sd),inset -3px -3px 5px var(--sl)}
.prompt-btn-ok{background:var(--acc);color:#fff;box-shadow:4px 4px 8px var(--sd),-5px -5px 10px var(--sl)}
.prompt-btn-ok:active{box-shadow:inset 3px 3px 6px rgba(0,0,0,0.3)}
.gender-title{font-size:13px;font-weight:500;color:var(--t1);text-align:center;margin-top:32px;margin-bottom:16px}
.gender-block{background:var(--bg);border-radius:16px;box-shadow:inset 4px 4px 8px var(--sd),inset -6px -6px 12px var(--sl);padding:6px 8px;margin-bottom:20px;display:flex;gap:8px;position:relative;z-index:1000}
.gender-btn{flex:1;padding:10px 14px;background:var(--bg);border:none;border-radius:10px;font-size:13px;font-weight:500;color:var(--t2);box-shadow:3px 3px 6px var(--sd),-5px -5px 10px var(--sl);cursor:pointer;transition:color .2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;position:relative;z-index:10000;touch-action:manipulation;-webkit-tap-highlight-color:rgba(232,112,90,0.2);user-select:none;-webkit-user-select:none}
.gender-btn:active{box-shadow:3px 3px 6px var(--sd),-4px -4px 8px var(--sl)}
.gender-btn.selected{color:var(--acc);box-shadow:none!important;background:var(--bg)!important;border:none!important}
.gender-btn svg{width:14px;height:14px;stroke:var(--t3);stroke-width:2.5;fill:none;transition:stroke .2s;pointer-events:none}
.gender-btn.selected svg{stroke:var(--acc)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;z-index:999;opacity:0;transition:opacity .6s ease;pointer-events:none}
.modal-overlay.active{display:block;opacity:1}
.instructions-modal{position:fixed;left:16px;right:16px;top:50%;transform:translate(0,-50%) scale(0.90) translateY(30px);background:var(--bg);border-radius:24px;padding:0;z-index:1001;max-height:85vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3),8px 8px 20px var(--sd),-8px -8px 20px var(--sl);opacity:0;transition:all .7s cubic-bezier(.22,1,.36,1);pointer-events:none}
.instructions-modal.active{transform:translate(0,-50%) scale(1) translateY(0);opacity:1;pointer-events:auto}
.instr-header{background:var(--bg);padding:0;position:relative;border-bottom:none}
.instr-header::after{display:none}
.instr-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;color:var(--bg);letter-spacing:2px;text-shadow:-1px -1px 2px rgba(0,0,0,0.15),1px 1px 2px rgba(255,255,255,0.7);filter:brightness(0.96) contrast(1.05);padding:40px 24px 0;text-transform:uppercase}
.instr-subtitle{font-size:16px;font-weight:400;text-align:center;color:var(--t1);letter-spacing:0.5px;padding:0 24px 16px}
.instr-body{padding:24px;max-height:calc(85vh - 180px);overflow-y:auto;-webkit-overflow-scrolling:touch}
.instr-body::-webkit-scrollbar{width:4px}
.instr-body::-webkit-scrollbar-track{background:transparent}
.instr-body::-webkit-scrollbar-thumb{background:var(--sd);border-radius:2px}
.instr-pain-promise{background:var(--bg);border-radius:16px;padding:18px 20px;margin-bottom:16px;box-shadow:inset 4px 4px 10px var(--sd),inset -4px -4px 10px var(--sl)}
.instr-pain-promise p{font-size:13px;line-height:1.7;color:var(--t2);margin-bottom:12px}
.instr-pain-promise p:last-child{margin-bottom:0;color:var(--t1);font-weight:500}
.instr-stats{display:flex;justify-content:center;align-items:center;gap:0;margin:12px auto;padding:16px;background:transparent;border-radius:14px;max-width:400px}
.instr-stat-item{text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.instr-stat-item:not(:last-child)::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:1px;height:40px;background:linear-gradient(180deg,transparent,var(--sd),transparent)}
.instr-stat-number{font-size:24px;font-weight:400;color:var(--acc);display:inline-block;margin-bottom:0;line-height:1}
.instr-stat-label{font-size:11px;color:var(--t3);letter-spacing:0.5px;margin-top:4px}
.instr-stat-label{font-size:10px;color:var(--t3);letter-spacing:0.5px;line-height:1.2;margin-top:6px}
.instr-principles{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.instr-principle{display:flex;gap:14px;align-items:center;padding:16px;background:var(--bg);border-radius:14px;box-shadow:4px 4px 10px var(--sd),-4px -4px 10px var(--sl);transition:all .2s}
.instr-principle:active{box-shadow:inset 3px 3px 6px var(--sd),inset -3px -3px 6px var(--sl)}
.instr-icon-wrap{width:36px;height:36px;min-width:36px;border-radius:0;background:transparent;box-shadow:none;display:flex;align-items:center;justify-content:center;padding:0}
.instr-icon-wrap svg{width:18px;height:18px;stroke:var(--t3);stroke-width:1.2;fill:none;margin:auto;display:block}
.instr-principle-content{flex:1}
.instr-principle-title{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:5px;line-height:1.3}
.instr-principle-text{font-size:12px;color:var(--t2);line-height:1.6}
.instr-footer{padding:0 24px 28px;text-align:center}
.instr-time{font-size:12px;color:var(--t3);margin-bottom:16px;font-weight:500;letter-spacing:0.5px}
.instr-btn{width:100%;padding:17px;font-size:16px;font-weight:600;color:#fff;background:var(--acc);border:none;border-radius:16px;cursor:pointer;box-shadow:6px 6px 14px var(--sd),-6px -6px 14px var(--sl);transition:all .25s;position:relative;overflow:hidden}
.instr-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left .5s}
.instr-btn:hover::before{left:100%}
.instr-btn:hover{transform:translateY(-2px);box-shadow:8px 8px 18px var(--sd),-8px -8px 18px var(--sl)}
.instr-btn:active{transform:scale(0.98);box-shadow:inset 4px 4px 8px rgba(0,0,0,.25)}
@keyframes modalSlideUp{0%{transform:translate(0,-50%) scale(0.85);opacity:0}100%{transform:translate(0,-50%) scale(1);opacity:1}}
</style>
