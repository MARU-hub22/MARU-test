<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#efefee;--t1:#2c2c2c;--t2:#666;--t3:#999;--acc:#FF6B6B;
  --bt:1px solid rgba(0,0,0,0.08);--bl:1px solid rgba(0,0,0,0.06);
  --bb:1px solid rgba(255,255,255,0.55);--br:1px solid rgba(255,255,255,0.45);
  --r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;font-family:'Inter','Helvetica Neue',-apple-system,sans-serif}
body{background:var(--bg)}

.screen{
  position:relative;z-index:1;
  width:100%;max-width:390px;height:100dvh;margin:0 auto;
  display:flex;flex-direction:column;
  padding:max(calc(env(safe-area-inset-top,0px) + 8px),24px) 24px 0;
}

.logo{
  flex-shrink:0;font-size:24px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--bg);text-shadow:-1px -1px 1px rgba(0,0,0,0.2),1px 1px 1px rgba(255,255,255,0.75),0 0 3px rgba(0,0,0,0.04);
  user-select:none;text-align:center;padding:8px 0;margin-bottom:8px;
}

.content{flex:1;display:flex;flex-direction:column;padding-top:0;padding-bottom:calc(120px + env(safe-area-inset-bottom,0px))}

/* ══════ PROFILE ══════ */
.profile-row{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:16px;
  opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s;
}
.profile-row.visible{opacity:1;transform:none}
.avatar-wrap{
  flex-shrink:0;width:119px;height:119px;border-radius:50%;
  border-top:var(--bb);border-left:var(--br);
  border-bottom:var(--bt);border-right:var(--bl);
  display:flex;align-items:center;justify-content:center;
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.2);filter:contrast(1.05)}
.avatar{
  width:115px;height:115px;border-radius:50%;overflow:hidden;background:#d0d0d0;
  border-top:var(--bb);border-left:var(--br);
  border-bottom:var(--bt);border-right:var(--bl);
}
@keyframes avatarBreathe{0%,100%{opacity:.7}50%{opacity:1}}
.avatar--initial{display:flex;align-items:center;justify-content:center;background:var(--bg)}
.avatar--initial .avatar-letter{
  font-size:42px;font-weight:600;color:var(--t1);line-height:1;
  opacity:0.7;animation:avatarBreathe 3s ease-in-out 0.5s infinite;
}
.profile-name{font-size:24px;font-weight:700;letter-spacing:-0.01em;color:var(--t1);line-height:1.1;margin-top:8px}

/* ══════ TEXT FLOW — ДЫХАНИЕ ══════ */
.text-flow{
  font-size:17px;font-weight:500;color:var(--t1);
  line-height:1.5;letter-spacing:-0.01em;
}
.text-secondary{
  font-size:14px;font-weight:400;color:#555;
  line-height:1.7;
}
.text-divider{
  width:40px;height:1px;background:rgba(0,0,0,0.06);
  margin:16px 0;
}
.text-flow--body{
  margin-top:16px;
  font-size:14px;font-weight:400;color:var(--t2);
  line-height:1.7;letter-spacing:0.01em;
}
.breath{
  display:inline;
  opacity:0;transition:opacity .5s ease;
}
.breath.visible{opacity:1}
.body-lead{font-size:15px;color:var(--t1)}

/* ══════ CTA ══════ */
.btn-wrap{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  padding:24px 24px calc(env(safe-area-inset-bottom,0px) + 20px);
  background:linear-gradient(to bottom,rgba(239,239,238,0),rgba(239,239,238,1) 30%);
  z-index:10;pointer-events:none;
  opacity:0;transition:opacity .4s;
}
.btn-wrap.visible{opacity:1}
.btn-start{
  pointer-events:auto;width:100%;height:56px;
  border:none;
  border-radius:var(--r);cursor:pointer;font-family:inherit;background:var(--acc);
  color:#fff;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;position:relative;overflow:visible;
}
.btn-start:active{transform:scale(0.98)}
.btn-text{transition:opacity .4s ease}

.btn-spark-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.btn-spark-svg path{fill:none;stroke:rgba(255,255,255,0.7);stroke-width:0.8;stroke-linecap:round;stroke-dasharray:0 9999;opacity:0}
@keyframes sparkRun{0%{stroke-dasharray:0 9999;opacity:0}6%{opacity:1}75%{stroke-dasharray:9999 0;opacity:.75}100%{stroke-dasharray:9999 0;opacity:0}}
.btn-spark-svg.run path{animation:sparkRun 1.8s cubic-bezier(.3,0,.2,1) forwards}
@keyframes btnPulse{
  0%{box-shadow:0 0 0 0 rgba(255,107,107,0)}
  40%{box-shadow:0 0 0 6px rgba(255,107,107,0.25)}
  100%{box-shadow:0 0 0 0 rgba(255,107,107,0)}
}
.btn-start.pulse{animation:btnPulse 2.0s ease 0s 1}

.btn-sub{text-align:center;font-size:11px;color:var(--t3);margin-top:14px;letter-spacing:0.03em;pointer-events:none}

.go-overlay{position:fixed;inset:0;background:var(--bg);opacity:0;pointer-events:none;z-index:999;transition:opacity .5s ease}
.go-overlay.flash{opacity:1}
@keyframes screenIn{0%{opacity:0;transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
.screen-in{opacity:0;animation:screenIn .4s cubic-bezier(0.22,1,0.36,1) .06s forwards}
</style>
</head>
<body>
<div class="go-overlay" id="goOverlay"></div>
<div class="screen">

  <div class="logo">MARU</div>

  <div class="content">

    <!-- ПРОФИЛЬ -->
    <div class="profile-row" id="prof">
      <div class="avatar-wrap"><div class="avatar avatar--initial" id="avatarWrap">
        <span class="avatar-letter" id="avatarLetter">А</span>
      </div></div>
      <div class="profile-name" id="userName">Анна</div>
    </div>

    <!-- ТЕКСТ -->
    <div class="text-flow">
      <span class="breath" id="b1">Привет</span><br>
      <span class="breath" id="b2">Я знаю, что ты хочешь решить проблему.</span><br>
      <span class="breath" id="b3">Я сама через это прошла.</span>
    </div>
    <div class="text-divider breath" id="b4"></div>
    <div class="text-flow text-secondary">
      <span class="breath" id="b5">Это не очередной тест или гороскоп — это то, что способно точно показать тебе, что делать дальше.</span><br><br>
      <span class="breath" id="b6">Это не займёт много времени.</span><br>
      <span class="breath" id="b7">Ты увидишь всё сама.</span>
    </div>

  </div>

  <!-- CTA -->
  <div class="btn-wrap" id="btnWrap">
    <button class="btn-start" id="btnStart" onclick="go()">
      <span class="btn-text" id="btnText">Хочу наконец разобраться</span>
      <svg class="btn-spark-svg" id="btnSpark"><path id="sparkPath"/></svg>
    </button>
    <div class="btn-sub">Без участия мужчины</div>
  </div>

</div>

  var s=document.querySelector('.screen');
  s.classList.add('screen-in');
  s.addEventListener('animationend',function(){s.classList.remove('screen-in')},{once:true});

  if(tg&&tg.initData){
    fetch('https://maru-test.vercel.app/api/photo',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({initData:tg.initData})
    })
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.first_name){nameEl.textContent=data.first_name;}
      if(data.photo_url){
        var tgImg=new Image();
        tgImg.style.cssText='width:100%;height:100%;object-fit:cover;display:block;border-radius:50%';
        tgImg.onload=function(){
          aw.classList.remove('avatar--initial');
          aw.innerHTML='';
          aw.appendChild(tgImg);
        };
        tgImg.src=data.photo_url;
      }
    })
    .catch(function(){});
  }
})();

function hap(t){
  try{if(navigator.vibrate)navigator.vibrate(t==='h'?[14,50,8]:8);}catch(e){}
  try{if(tg)tg.HapticFeedback.impactOccurred(t==='h'?'medium':'light');}catch(e){}
}

/* Каскад — дыхание */
setTimeout(function(){
  document.getElementById('prof').classList.add('visible');
},100);
setTimeout(function(){document.getElementById('b1').classList.add('visible')},500);
setTimeout(function(){document.getElementById('b2').classList.add('visible')},800);
setTimeout(function(){document.getElementById('b3').classList.add('visible')},1100);
setTimeout(function(){document.getElementById('b4').classList.add('visible')},1500);
setTimeout(function(){document.getElementById('b5').classList.add('visible')},1800);
setTimeout(function(){document.getElementById('b6').classList.add('visible')},2200);
setTimeout(function(){document.getElementById('b7').classList.add('visible')},2500);
setTimeout(function(){
  var bw=document.getElementById('btnWrap');
  bw.classList.add('visible');
  setTimeout(function(){
    var btn=document.getElementById('btnStart');
    var svg=document.getElementById('btnSpark');
    var sp=document.getElementById('sparkPath');
    var w=btn.offsetWidth,h=btn.offsetHeight,r=16;
    sp.setAttribute('d',
      'M'+r+','+(h-1)+' L'+(w-r)+','+(h-1)+
      ' Q'+(w-1)+','+(h-1)+' '+(w-1)+','+(h-r)+
      ' L'+(w-1)+','+r
    );
    /* spark один раз */
    svg.classList.add('run');
    sp.addEventListener('animationend',function(){
      svg.classList.remove('run');
      /* пульс бордера один раз */
      btn.classList.remove('pulse');btn.offsetHeight;btn.classList.add('pulse');
      btn.addEventListener('animationend',function(){btn.classList.remove('pulse');},{once:true});
    },{once:true});
  },200);

  /* одноразовая смена текста убрана — один CTA */
},2900);

/* Переход */
function go(){
  hap('h');
  document.getElementById('goOverlay').classList.add('flash');
  var sc=document.querySelector('.screen');
  sc.style.transition='opacity .4s ease,transform .4s ease';
  sc.style.opacity='0';sc.style.transform='scale(0.97)';
  setTimeout(function(){window.location.href='screen3.html';},480);
}
</script>
