<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MARU · Расшифровка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  :root {
    /* screen3: кастомные спейсинги и r чуть меньше */
    --sp1: 8px;
    --sp2: 16px;
    --sp3: 24px;
    --r: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
  button { -webkit-appearance: none; }
  body {
    background: var(--bg);
    font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--t1);
    min-height: 100dvh;
    max-width: 390px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    padding: calc(env(safe-area-inset-top,0px) + 12px) var(--sp3) 10px;
    gap: 12px;
  }

  .heart-wrap {
    position: relative;
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .heart-ghost {
    transition: opacity 0.5s ease;
  }
  .heart-svg { display: block; overflow: visible; transform: translateY(2px); }
  .heart-fill-path {
    transition: fill 0.5s ease;
  }
  #heartClipRect {
    transition: y 0.45s cubic-bezier(0.22,1,0.36,1), height 0.45s cubic-bezier(0.22,1,0.36,1);
  }
  .heart-wrap.pulse {
    animation: heartPulse 0.5s ease;
  }
  @keyframes heartPulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  .block-title {
    flex: 1;
    font-size: 12px;
    line-height: 26px;
    color: var(--t3);
    font-weight: 500;
    letter-spacing: 0;
    transition: opacity 0.2s ease;
  }
  .block-title.fade-out { opacity: 0; }

  .save-hint {
    padding: 0 var(--sp3);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    font-style: normal;
    font-weight: 500;
    line-height: 1.4;
    color: #E63946;
    letter-spacing: -0.005em;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.4s ease, max-height 0.4s ease, margin 0.4s ease;
    pointer-events: none;
  }
  .save-hint.show {
    opacity: 1;
    max-height: 24px;
    margin-top: -2px;
    margin-bottom: 6px;
  }

  .block-insert {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 var(--sp3);
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    font-size: 17px;
    font-style: italic;
    font-weight: 400;
    line-height: 1.35;
    letter-spacing: 0.005em;
    color: rgba(44, 44, 44, 0.85);
    text-align: center;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.4s ease;
  }
  .block-insert.show {
    opacity: 1;
    pointer-events: all;
  }
  .block-insert .bi-line1,
  .block-insert .bi-line2 {
    max-width: 280px;
    margin: 0 auto;
    text-wrap: balance;
  }
  .block-insert .bi-line2 {
    margin-top: 4px;
  }
  /* плавное появление каждой буквы — handwriting эффект */
  .block-insert .ch,
  .ov-typed .ch {
    display: inline;
    opacity: 0;
    transition: opacity 0.28s ease;
  }
  .block-insert .ch.on,
  .ov-typed .ch.on {
    opacity: 1;
  }
  .block-insert .caret {
    display: inline-block;
    margin-left: 2px;
    color: var(--t1);
    font-style: normal;
    font-weight: 400;
    animation: caretBlink 0.9s steps(2) infinite;
  }
  @keyframes caretBlink {
    0%, 50%   { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .btn-back {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border-top: 1px solid rgba(0,0,0,0.08);
    border-left: 1px solid rgba(0,0,0,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.55);
    border-right: 1px solid rgba(255,255,255,0.45);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .btn-back:active { transform: scale(0.9); opacity: 0.6; }
  .btn-back svg {
    width: 14px; height: 14px;
    stroke: var(--t2); stroke-width: 2;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }

  /* QUESTION */
  .q-text {
    padding: 0 var(--sp3) var(--sp3);
    font-size: 17px;
    font-weight: 600;
    line-height: 1.38;
    color: var(--t1);
    letter-spacing: -0.01em;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .q-text.fade-out { opacity: 0; transform: translateY(-4px); }
  .q-text.fade-in { animation: fadeInUp 0.28s cubic-bezier(0.22,1,0.36,1) forwards; }
  .q-text.hidden { display: none; }

  /* echo-callback — наклонная красная строка над первым ответом */
  .q-echo {
    padding: 0 var(--sp3);
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    font-size: 14px;
    font-style: italic;
    font-weight: 500;
    line-height: 1.5;
    color: #E63946;
    letter-spacing: 0;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.5s ease, max-height 0.4s ease, padding 0.4s ease;
    pointer-events: none;
  }
  .q-echo.show {
    opacity: 1;
    max-height: 80px;
    padding: 0 var(--sp3) 12px;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ANSWERS */
  .answers {
    padding: 0 var(--sp3) 16px;
    display: flex;
    flex-direction: column;
    gap: var(--sp1);
  }

  /* кнопка «Дальше» — мелкая текстовая, появляется после первого выбора */
  .next-wrap {
    padding: 4px var(--sp3) calc(env(safe-area-inset-bottom,0px) + 28px);
    display: flex;
    justify-content: center;
    min-height: 32px;
  }
  .next-btn {
    background: none;
    border: none;
    padding: 8px 16px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--t1);
    letter-spacing: 0.02em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .next-btn.show {
    opacity: 0.85;
    transform: translateY(0);
    pointer-events: auto;
  }
  .next-btn:active { opacity: 1; transform: translateY(0) scale(0.97); }
  .next-btn .arrow {
    display: inline-block;
    margin-left: 4px;
    transition: transform 0.2s ease;
  }
  .next-btn:active .arrow { transform: translateX(2px); }

  .card {
    border-top: 1px solid rgba(0,0,0,0.08);
    border-left: 1px solid rgba(0,0,0,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.55);
    border-right: 1px solid rgba(255,255,255,0.45);
    border-radius: var(--r);
    background: transparent;
    padding: 13px var(--sp2);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.3s ease, opacity 0.3s ease, filter 0.3s ease;
    -webkit-user-select: none;
  }
  .card:active { transform: scale(0.985); }

  .card.dimmed {
    opacity: 0.35;
    transform: scale(0.98);
  }

  .card.selected {
    border-top: 1px solid rgba(255,111,97,0.35);
    border-left: 1px solid rgba(255,111,97,0.25);
    border-bottom: 1px solid rgba(255,111,97,0.55);
    border-right: 1px solid rgba(255,111,97,0.45);
    transform: scale(1.01);
    opacity: 1;
    filter: none;
    z-index: 1;
    position: relative;
  }

  .radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border-top: 1px solid rgba(0,0,0,0.08);
    border-left: 1px solid rgba(0,0,0,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.55);
    border-right: 1px solid rgba(255,255,255,0.45);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .radio-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--acc);
    transform: scale(0);
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
  }
  .card.selected .radio-dot { transform: scale(1); }
  .card.selected .radio { border-color: rgba(255,111,97,0.45); }

  .ans-text {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--t2);
    flex: 1;
  }
  .card.selected .ans-text {
    color: var(--t1);
    font-weight: 500;
  }

  /* ─── OVERLAY ─── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--sp3);
    background: rgba(239,239,238,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.32s ease;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .overlay-card {
    width: 100%;
    max-width: 340px;
    border-radius: 20px;
    background: transparent;
    padding: 28px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(20px) scale(0.96);
    transition: transform 0.38s cubic-bezier(0.22,1,0.36,1);
  }
  .overlay.show .overlay-card {
    transform: translateY(0) scale(1);
  }

  /* inline-сердце внутри .ov-text — рисуется по контуру как ручкой */
  .ov-heart-inline {
    display: inline-block;
    vertical-align: -2px;
    margin-left: 6px;
    transform-origin: center;
  }
  .ov-heart-inline path {
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    transition: stroke-dashoffset 1.1s cubic-bezier(0.5, 0, 0.2, 1);
  }
  .ov-heart-inline.draw path {
    stroke-dashoffset: 0;
  }
  .ov-heart-inline.draw {
    animation: ovHeartPulseSoft 1.8s ease-in-out 1.3s infinite;
  }
  @keyframes ovHeartPulseSoft {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }

  /* старое блочное сердце — оставлено для совместимости (не используется) */
  .ov-heart {
    width: 30px;
    height: 30px;
    display: none;
    align-items: center;
    justify-content: center;
    animation: ovHeartPulse 1.6s ease-in-out infinite;
  }
  .ov-heart svg { display: block; }
  @keyframes ovHeartPulse {
    0%, 100% { transform: scale(1);    opacity: 1; }
    50%      { transform: scale(1.10); opacity: 0.85; }
  }

  /* иконка */
  .ov-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border-top: 1px solid rgba(0,0,0,0.08);
    border-left: 1px solid rgba(0,0,0,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.55);
    border-right: 1px solid rgba(255,255,255,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    position: relative;
  }
  .ov-icon svg {
    width: 22px; height: 22px;
    stroke: var(--acc); stroke-width: 1.8; fill: none;
  }
  .ov-icon::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgba(255,111,97,0);
    animation: iconPulse 2.4s ease-out infinite;
  }
  @keyframes iconPulse {
    0%   { inset: -5px;  border-color: rgba(255,111,97,0.3); }
    100% { inset: -16px; border-color: rgba(255,111,97,0);   }
  }

  .ov-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--acc);
    margin-bottom: 16px;
  }

  /* гравюра MARU — letterpress, усиленный */
  .ov-brand {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--bg);
    text-shadow:
      -1.5px -1.5px 1.5px rgba(0,0,0,0.28),
      1.5px 1.5px 1.5px rgba(255,255,255,0.85),
      0 0 3px rgba(0,0,0,0.06);
    user-select: none;
    text-align: center;
    padding: 6px 0;
    margin-bottom: 32px;
  }

  .ov-text {
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    font-size: 17px;
    font-style: italic;
    font-weight: 400;
    line-height: 1.35;
    color: rgba(44, 44, 44, 0.85);
    text-align: center;
    letter-spacing: 0.005em;
    margin-bottom: 0;
    max-width: 280px;
    text-wrap: balance;
  }
  .ov-text strong { font-weight: 500; font-style: italic; }

  /* подсказка про мульти-выбор — мельче, тише, отдельным блоком */
  .ov-multi-hint {
    margin-top: 24px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--t3);
    text-align: center;
    letter-spacing: 0.01em;
    max-width: 260px;
    line-height: 1.45;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .ov-multi-hint.show { opacity: 0.85; }

  /* ─── ИНФОГРАФИКА ─── */
  .ov-infograph {
    width: 100%;
    margin: 20px 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* строка с иконкой + текстом */
  .ov-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ov-row-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border-top: 1px solid rgba(0,0,0,0.08);
    border-left: 1px solid rgba(0,0,0,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.55);
    border-right: 1px solid rgba(255,255,255,0.45);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ov-row-icon svg {
    width: 14px; height: 14px;
    stroke: var(--acc); stroke-width: 1.8; fill: none;
  }
  .ov-row-main {
    font-size: 13px;
    font-weight: 500;
    color: var(--t1);
    line-height: 1.3;
  }
  .ov-row-hint {
    font-size: 11px;
    color: var(--t3);
    margin-top: 2px;
  }

  /* прогресс-бар для оверлея 2 */
  .ov-progress {
    width: 100%;
    margin: 20px 0 24px;
  }
  .ov-progress-track {
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }
  .ov-progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 50%;
    background: var(--acc);
    border-radius: 2px;
    animation: progressIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.3s both;
  }
  @keyframes progressIn {
    from { width: 0; }
    to   { width: 50%; }
  }
  .ov-progress-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }
  .ov-progress-labels span {
    font-size: 10px;
    color: var(--t3);
    letter-spacing: 0.04em;
  }
  .ov-progress-labels span.done { color: var(--acc); font-weight: 500; }

  .ov-author {
    margin-top: 14px;
    font-size: 11px;
    color: var(--t3);
    text-align: center;
    letter-spacing: 0.02em;
  }

</style>
</head>
<body>

<!-- ─── ОВЕРЛЕЙ 1: СТАРТ ─── -->
<div class="overlay" id="ov1">
  <div class="overlay-card">
    <div class="ov-brand">MARU</div>
    <div class="ov-text">
      <span class="ov-typed" id="ov1Typed"></span><svg class="ov-heart-inline" id="ov1Heart" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path pathLength="100" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="none" stroke="#2c2c2c" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>
    </div>
    <div class="ov-multi-hint" id="ov1MultiHint">Можно выбрать два варианта, если оба про него</div>
  </div>
</div>

<div class="header">
  <div class="heart-wrap">
    <svg class="heart-svg" viewBox="0 0 24 24" width="26" height="26">
      <defs>
        <clipPath id="heartClip">
          <rect id="heartClipRect" x="0" y="24" width="24" height="0"/>
        </clipPath>
      </defs>
      <path class="heart-ghost" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="#E63946" opacity="0.13"/>
      <path class="heart-fill-path" id="heartFillPath" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="#E63946" clip-path="url(#heartClip)"/>
    </svg>
  </div>
  <div class="block-title" id="blockTitle">Блок 1 · Кто он</div>
  <button class="btn-back" onclick="goBack()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
</div>

<div class="save-hint" id="saveHint">Ответы сохраняются автоматически.</div>

<div class="q-text" id="qText"></div>
<div class="block-insert" id="blockInsert"></div>
<div class="q-echo" id="qEcho"></div>

<div class="answers" id="answers"></div>
<div class="next-wrap"><button class="next-btn" id="nextBtn" type="button">Дальше<span class="arrow">→</span></button></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); try{tg.setBackgroundColor('#efefee');tg.setHeaderColor('#efefee');}catch(e){} }

  function hap(t) {
    try { tg?.HapticFeedback?.impactOccurred(t === 'm' ? 'medium' : 'light'); } catch(e) {}
    try { navigator.vibrate(t === 'm' ? 14 : 7); } catch(e) {}
  }

  function showOverlay(id) {
    // прячем save-hint и q-echo чтобы не пересекались с overlay
    const _sh = document.getElementById('saveHint');
    if (_sh) _sh.classList.remove('show');
    const _qe = document.getElementById('qEcho');
    if (_qe) _qe.classList.remove('show');

    document.getElementById(id).classList.add('show');
    hap('l');
    if (id === 'ov1') {
      const typed = document.getElementById('ov1Typed');
      const heart = document.getElementById('ov1Heart');
      const multiHint = document.getElementById('ov1MultiHint');
      if (multiHint) multiHint.classList.remove('show');
      if (typed) {
        // СБРОС: чистим текст и снимаем класс draw чтобы сердце снова было «не нарисовано»
        typed.innerHTML = '';
        if (heart) heart.classList.remove('draw');
        // запускаем handwrite после короткой паузы (чтобы overlay-card успел проявиться)
        setTimeout(function() {
          handwrite('Сейчас ты ответишь за него. Так, как ты его видишь. Это и есть твоя правда', typed, 48, function() {
            // ПОСЛЕ последней буквы — рисуем сердце по контуру
            if (heart) setTimeout(function() { heart.classList.add('draw'); }, 200);
            // потом показываем подсказку про мульти-выбор
            if (multiHint) setTimeout(function() { multiHint.classList.add('show'); }, 800);
          });
        }, 350);
      }
      // ov1: handwrite ~3.4s + сердце 1.3s + hint 0.6s = ~5.5s + 2s hold = 7.5s
      setTimeout(function() { closeOverlay(id); }, 7500);
    } else {
      setTimeout(function() { closeOverlay(id); }, 3000);
    }
  }

  function closeOverlay(id) {
    hap('m');
    document.getElementById(id).classList.remove('show');
    overlayActive = false;
    if (pendingNext !== null) { const idx = pendingNext; pendingNext = null; renderQ(idx); }
    else if (id === 'ov1') { renderQ(0); }
  }

  let overlayActive = false, pendingNext = null;
  let QUESTIONS = [];
  let current = 0;
  let userAnswers = {}; // idx → массив выбранных indices (1..2 элемента)
  let timestamps = {};  // idx → timestamp ms
  let idleTimer = null;
  let insertActive = false;

  // ─── СТРУКТУРА ТЕСТА v2: 5 блоков × 7 = 35 вопросов ───
  const TOTAL_Q = 35;
  const BLOCKS = [
    { title: 'Кто он',         from: 0,  to: 6  },
    { title: 'Деньги',         from: 7,  to: 13 },
    { title: 'Почему молчит',  from: 14, to: 20 },
    { title: 'Что скрывает',   from: 21, to: 27 },
    { title: 'Любит ли он',    from: 28, to: 34 },
  ];
  // inline-вставки: ключ = индекс ПЕРВОГО вопроса нового блока
  const BLOCK_INSERTS = {
    7:  ['Я знаю, какой он с другими.',   'Но почему со мной он часто считает?'],
    14: ['С деньгами всё ясно.',          'А почему он молчит именно когда мне больно?'],
    21: ['Я знаю, когда он замолкает.',   'Но страшнее то, что он за этим прячет.'],
    28: ['Все вопросы вели к одному.',    'Любит ли он меня… или я просто удобная?'],
  };

  function getCurrentBlock(idx) {
    for (let i = 0; i < BLOCKS.length; i++) {
      if (idx >= BLOCKS[i].from && idx <= BLOCKS[i].to) return i;
    }
    return BLOCKS.length - 1;
  }
  function isBlockLastTwo(idx) {
    const bIdx = getCurrentBlock(idx);
    // финальный блок (5 «Любит ли он») — без goal-gradient, финал должен быть красным как кульминация
    if (bIdx === BLOCKS.length - 1) return false;
    const b = BLOCKS[bIdx];
    return idx >= b.to - 1; // последние 2 вопроса блока
  }
  function applyEndowedProgress(idx) {
    // Q1, Q2, Q3 показывают фиксированно 3/35 (endowed progress)
    if (idx <= 2) return (3 / TOTAL_Q) * 100;
    return ((idx + 1) / TOTAL_Q) * 100;
  }
  // ─── ЦВЕТА СЕРДЦА ───
  const HEART_COLOR_BASE = '#E63946';   // яркий карминный — обычные вопросы
  const HEART_COLOR_GOAL = '#2979FF';   // электрик — последние 2 в блоке (goal-gradient)

  // ─── ЗАГРУЗКА ВОПРОСОВ (публичный JSON без энергий и скоринга) ───
  async function loadData() {
    try {
      const url = 'https://maru-hub22.github.io/MARU-test/maru_questions_public.json?t=' + Date.now();
      const res = await fetch(url, { cache: 'no-store' });
      const data = await res.json();
      QUESTIONS = data.questions.slice(0, TOTAL_Q);
      // SCORING и ARCHETYPES_MAP больше не нужны на клиенте — всё на сервере
      overlayActive = true;
      setTimeout(() => showOverlay('ov1'), 300);
    } catch(e) {
      document.getElementById('qText').textContent = 'Ошибка загрузки. Проверь соединение.';
    }
  }

  function updateHeart(idx) {
    const pct = applyEndowedProgress(idx);
    const rect = document.getElementById('heartClipRect');
    const fillH = (24 * pct) / 100;
    rect.setAttribute('y', 24 - fillH);
    rect.setAttribute('height', fillH);

    const fillPath = document.getElementById('heartFillPath');
    const ghost = document.querySelector('.heart-ghost');
    const goal = isBlockLastTwo(idx);
    const color = goal ? HEART_COLOR_GOAL : HEART_COLOR_BASE;
    fillPath.setAttribute('fill', color);
    if (ghost) {
      // на goal-gradient ghost тоже подкрашивается в электрик
      ghost.setAttribute('fill', color);
    }
  }

  function updateBlockTitle(idx) {
    const bIdx = getCurrentBlock(idx);
    const el = document.getElementById('blockTitle');
    const newText = 'Блок ' + (bIdx + 1) + ' · ' + BLOCKS[bIdx].title;
    if (el.textContent === newText) return;
    el.classList.add('fade-out');
    setTimeout(() => {
      el.textContent = newText;
      el.classList.remove('fade-out');
    }, 200);
  }

  // ─── INLINE-ВСТАВКА МЕЖДУ БЛОКАМИ ───
  function shouldShowInsert(nextIdx) {
    if (!BLOCK_INSERTS[nextIdx]) return false;
    try {
      const seen = JSON.parse(localStorage.getItem('maru_seen_block_transitions') || '[]');
      if (seen.indexOf(nextIdx) !== -1) return false;
    } catch(e) {}
    return true;
  }
  function markInsertSeen(nextIdx) {
    try {
      const seen = JSON.parse(localStorage.getItem('maru_seen_block_transitions') || '[]');
      if (seen.indexOf(nextIdx) === -1) seen.push(nextIdx);
      localStorage.setItem('maru_seen_block_transitions', JSON.stringify(seen));
    } catch(e) {}
  }
  // handwrite — каждая буква проявляется через opacity transition (как чернила)
  // пробелы оставляем обычными, чтобы браузер мог переносить по словам
  function handwrite(text, el, speed, cb) {
    el.innerHTML = '';
    const spans = [];
    for (let k = 0; k < text.length; k++) {
      if (text[k] === ' ') {
        // обычный пробел текстовым узлом — браузер сможет перенести строку здесь
        el.appendChild(document.createTextNode(' '));
        continue;
      }
      const span = document.createElement('span');
      span.className = 'ch';
      span.textContent = text[k];
      el.appendChild(span);
      spans.push(span);
    }
    let i = 0;
    function step() {
      if (i < spans.length) {
        spans[i].classList.add('on');
        i++;
        setTimeout(step, speed);
      } else if (cb) cb();
    }
    step();
  }

  function showBlockInsert(nextIdx, callback) {
    const lines = BLOCK_INSERTS[nextIdx];
    if (!lines) { callback(); return; }
    insertActive = true;
    markInsertSeen(nextIdx);

    // прячем save-hint и q-echo чтобы не пересекались с вставкой
    const sh = document.getElementById('saveHint');
    if (sh) sh.classList.remove('show');
    const qe = document.getElementById('qEcho');
    if (qe) qe.classList.remove('show');

    const insertEl = document.getElementById('blockInsert');

    // подготовка контейнера и показ full-screen overlay
    insertEl.innerHTML = '<div class="bi-line1" id="biL1"></div><div class="bi-line2" id="biL2"></div>';
    insertEl.classList.add('show');
    hap('m');

    const l1 = document.getElementById('biL1');
    const l2 = document.getElementById('biL2');

    // печатаем строку 1, пауза, печатаем строку 2, ждём, fade-out
    setTimeout(() => {
      handwrite(lines[0], l1, 40, () => {
        setTimeout(() => {
          handwrite(lines[1], l2, 40, () => {
            setTimeout(() => {
              insertEl.classList.remove('show');
              setTimeout(() => {
                insertActive = false;
                callback();
              }, 400);
            }, 2500);
          });
        }, 500);
      });
    }, 200);
  }

  // ─── REAL FLOW ECHO (на Q1, Q15, Q29) ───
  // в реальном flow используем ТОЛЬКО значение из localStorage, без тестового fallback
  function getRealEchoState() {
    try { return localStorage.getItem('maru_her_state') || null; }
    catch(e) { return null; }
  }
  function showQEcho(previewKey) {
    const state = getRealEchoState();
    if (!state) return; // если на screen1 ничего не выбрано — echo не показываем (тишина лучше фальши)
    const fn = ECHO_PREVIEWS[previewKey];
    if (!fn) return;
    const lines = fn(state);
    const echoEl = document.getElementById('qEcho');
    const wrap = document.getElementById('answers');
    if (!echoEl || !wrap) return;

    // прячем save-hint и убиваем idle timer чтобы он не показал save-hint поверх echo
    const sh = document.getElementById('saveHint');
    if (sh) sh.classList.remove('show');
    if (idleTimer) clearTimeout(idleTimer);

    echoEl.innerHTML = lines[0] + '<br>' + lines[1];
    echoEl.classList.add('show');

    // снимаем при первом клике на любую карточку ответа
    const hide = function() {
      echoEl.classList.remove('show');
      wrap.removeEventListener('click', hide, true);
    };
    wrap.addEventListener('click', hide, true);
  }

  // ─── IDLE TIMER + SAVE HINT ───
  function resetIdleTimer() {
    if (idleTimer) clearTimeout(idleTimer);
    try {
      if (localStorage.getItem('maru_save_hinted') === '1') return;
    } catch(e) {}
    idleTimer = setTimeout(showSaveHint, 30000);
  }
  function showSaveHint() {
    // guard: только одна доп фраза на экран — никогда не пересекаемся с echo / insert / overlay
    const echoEl = document.getElementById('qEcho');
    if (echoEl && echoEl.classList.contains('show')) return;
    if (insertActive) return;
    if (overlayActive) return;
    const el = document.getElementById('saveHint');
    el.classList.add('show');
    try { localStorage.setItem('maru_save_hinted', '1'); } catch(e) {}
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function renderQ(idx) {
    current = idx;
    if (idx >= QUESTIONS.length) { finishTest(); return; }

    /* кнопка назад — только со второго вопроса */
    var backBtn = document.querySelector('.btn-back');
    if (backBtn) backBtn.style.visibility = idx > 0 ? 'visible' : 'hidden';

    const q = QUESTIONS[idx];
    updateHeart(idx);
    updateBlockTitle(idx);
    resetIdleTimer();
    timestamps[idx] = Date.now();

    const qEl = document.getElementById('qText');
    qEl.classList.remove('fade-in'); qEl.classList.add('fade-out');
    setTimeout(() => {
      qEl.textContent = q.text;
      qEl.classList.remove('fade-out'); qEl.classList.add('fade-in');
    }, 200);

    const wrap = document.getElementById('answers');
    wrap.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
    wrap.style.opacity = '0'; wrap.style.transform = 'translateY(8px)';

    const nextBtn = document.getElementById('nextBtn');
    nextBtn.classList.remove('show');

    setTimeout(() => {
      wrap.innerHTML = '';

      // нормализуем legacy формат (число) → массив
      if (typeof userAnswers[idx] === 'number') userAnswers[idx] = [userAnswers[idx]];
      if (!Array.isArray(userAnswers[idx])) userAnswers[idx] = [];

      const updateNextVisibility = () => {
        if (userAnswers[idx] && userAnswers[idx].length > 0) {
          nextBtn.classList.add('show');
        } else {
          nextBtn.classList.remove('show');
        }
      };

      q.answers.forEach((a, i) => {
        const card = document.createElement('div');
        const isSel = userAnswers[idx].includes(i);
        card.className = 'card' + (isSel ? ' selected' : '');
        card.innerHTML = '<div class="radio"><div class="radio-dot"></div></div><div class="ans-text">' + a.text + '</div>';
        card.onclick = () => {
          resetIdleTimer();
          const sel = userAnswers[idx] || [];
          const already = sel.indexOf(i);

          if (already !== -1) {
            // тап по уже выбранной → снимаем
            sel.splice(already, 1);
            card.classList.remove('selected');
            hap('l');
          } else if (sel.length >= 2) {
            // лимит 2 — третий тап игнорируем + микро-shake
            hap('l');
            card.style.transform = 'scale(0.97)';
            setTimeout(() => { card.style.transform = ''; }, 120);
            return;
          } else {
            // добавляем
            sel.push(i);
            card.classList.add('selected');
            hap('l');
          }

          userAnswers[idx] = sel;
          updateNextVisibility();
          // сохранение прогресса
          try { localStorage.setItem('maru_progress', JSON.stringify({current:idx, userAnswers:userAnswers})); } catch(e) {}
        };
        wrap.appendChild(card);
      });

      // если возврат через goBack и уже что-то выбрано — кнопка сразу видна
      updateNextVisibility();

      wrap.style.opacity = '1'; wrap.style.transform = 'translateY(0)';
      // echo-callbacks на ключевых вопросах (Q1, Q15, Q29)
      if (idx === 0)       setTimeout(() => showQEcho(1),  700);
      else if (idx === 14) setTimeout(() => showQEcho(15), 700);
      else if (idx === 28) setTimeout(() => showQEcho(29), 700);
    }, 200);

    // обработчик кнопки «Дальше» (переустанавливаем при каждом renderQ)
    nextBtn.onclick = () => {
      if (!userAnswers[idx] || userAnswers[idx].length === 0) return;
      hap('m');
      // dim неактивных карточек на момент перехода
      wrap.querySelectorAll('.card').forEach(c => {
        if (!c.classList.contains('selected')) c.classList.add('dimmed');
      });
      nextBtn.classList.remove('show');
      // пульс сердца на конце блока
      var b = BLOCKS[getCurrentBlock(idx)];
      if (idx === b.to) {
        var hw = document.querySelector('.heart-wrap');
        hw.classList.remove('pulse'); void hw.offsetWidth;
        hw.classList.add('pulse');
      }
      setTimeout(() => {
        const next = idx + 1;
        if (shouldShowInsert(next)) {
          showBlockInsert(next, () => renderQ(next));
        } else {
          renderQ(next);
        }
      }, 260);
    };
  }

  function goBack() {
    hap('l');
    if (current > 0) { current--; renderQ(current); }
  }

  // ─── СКОРИНГ ВЫНЕСЕН НА СЕРВЕР (api/score.js на Vercel) ───
  // Клиент только собирает индексы выбранных ответов и timestamps,
  // отправляет на сервер, получает готовый результат.
  async function finishTest() {
    const total = QUESTIONS.length;

    // массив выбранных индексов: [[2], [1,3], [0], ...] — длина = 35
    const answers = [];
    for (let i = 0; i < total; i++) {
      const sel = userAnswers[i];
      answers.push(Array.isArray(sel) ? sel : (sel != null ? [sel] : []));
    }

    // timestamps в виде массива
    const ts = [];
    for (let i = 0; i < total; i++) ts.push(timestamps[i] || Date.now());

    // время ответов для лога
    const answerTimes = [];
    for (let i = 0; i < total; i++) {
      const t = timestamps[i];
      const nextTs = timestamps[i + 1] || Date.now();
      answerTimes.push(Math.round((nextTs - t) / 1000 * 10) / 10);
    }
    const totalTime = Math.round(answerTimes.reduce((a, b) => a + b, 0));
    const avgTime = Math.round(totalTime / total * 10) / 10;

    // лог ответов БЕЗ энергий (клиент их не знает)
    const answerLog = [];
    for (let i = 0; i < total; i++) {
      answerLog.push({
        q: QUESTIONS[i].id,
        selected: answers[i],
        multi: answers[i].length > 1,
        time: answerTimes[i]
      });
    }

    // ─── СКОРИНГ НА СЕРВЕРЕ ───
    let result;
    try {
      const r = await fetch('https://maru-test.vercel.app/api/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers: answers, timestamps: ts })
      });
      if (!r.ok) throw new Error('Server returned ' + r.status);
      result = await r.json();
      if (result.error) throw new Error(result.error);
    } catch (err) {
      console.error('Score API failed:', err);
      document.getElementById('qText').textContent = 'Ошибка обработки. Попробуй ещё раз.';
      return;
    }

    // дополняем то что считается на клиенте (тайминги)
    result.totalTime = totalTime;
    result.avgTime = avgTime;

    // основной результат
    localStorage.setItem('maru_block1', JSON.stringify(result));
    try{localStorage.removeItem('maru_progress');}catch(e){}
    // детальный лог ответов (для бэкенда)
    localStorage.setItem('maru_answer_log', JSON.stringify(answerLog));

    // ─── FIREBASE ───
    const fbData = {
      result: result,
      answerLog: answerLog,
      user: {
        first_name: tg?.initDataUnsafe?.user?.first_name || null,
        photo_url: tg?.initDataUnsafe?.user?.photo_url || null
      },
      meta: {
        userAgent: navigator.userAgent,
        screen: window.innerWidth + 'x' + window.innerHeight,
        lang: navigator.language,
        tgUser: tg?.initDataUnsafe?.user ? {
          id: tg.initDataUnsafe.user.id,
          first_name: tg.initDataUnsafe.user.first_name,
          username: tg.initDataUnsafe.user.username || null
        } : null
      }
    };
    fetch('https://maru-app-2071c-default-rtdb.europe-west1.firebasedatabase.app/results.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(fbData)
    }).then(r => r.json()).then(d => {
      if(d && d.name) localStorage.setItem('maru_result_id', d.name);
    }).catch(() => {
      // Firebase недоступен — сохраняем локальный ID
      var localId = 'local_' + Date.now();
      localStorage.setItem('maru_result_id', localId);
    });

    // переход на результат
    document.body.style.transition = 'opacity .25s ease';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = 'screen4.html'; }, 260);
  }

  // имя юзера из Telegram WebApp — только если оно «нормальное»
  // (буквы латиницы/кириллицы, дефис, пробел; 2..20 символов)
  function getUserName() {
    try {
      const fn = tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name;
      if (!fn) return null;
      if (/^[А-Яа-яЁёA-Za-z][А-Яа-яЁёA-Za-z\s\-]{1,19}$/.test(fn.trim())) {
        return fn.trim();
      }
      return null;
    } catch(e) { return null; }
  }
  const ECHO_PREVIEWS = {
    1:  function(s){
          const name = getUserName();
          const greet = name ? (name + ', «') : '«';
          return [greet + s + '» — твои слова.', 'Сейчас разберёмся, что с этим делать.'];
        },
    15: function(s){ return ['Помнишь, ты написала «' + s + '»?', 'Молчание — часть этого.']; },
    29: function(s){ return ['Ты пришла со словами «' + s + '».', 'Остался последний блок. Самый важный.']; }
  };
  // ─── СТАРТ ───
  loadData();
</script>
</body>
