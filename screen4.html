<!DOCTYPE html><!-- v=101043 -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;background:var(--bg);overflow:hidden;
  -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
  font-family:'Inter',-apple-system,sans-serif;
}

/* ══ ДИЗАЙН-ТОКЕНЫ (кастом) ══ */
:root{
  --green:#70892E;
}

/* ══ OVERLAY ══ */
/* ══ OVERLAY — унифицирован с screen7 ══ */
.ov{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 32px;
  background:var(--bg);transition:opacity .5s;
}
.ov.hide{opacity:0;pointer-events:none}
.ov-group{
  display:flex;flex-direction:column;align-items:center;
}

/* фаза загрузки */
.ov-phase{
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--t3);min-height:14px;
  transition:opacity .3s;
}
.ov-msg{
  font-size:13px;font-weight:400;color:var(--t2);line-height:1.6;
  text-align:center;margin-top:8px;max-width:240px;
  opacity:0;transform:translateY(4px);
  transition:opacity .35s,transform .35s;
}
.ov-msg.s{opacity:1;transform:none}
.ov-dots{display:flex;gap:5px;margin-top:16px}
.ov-dot{width:4px;height:4px;border-radius:50%;background:var(--t3);opacity:.3;animation:dp 1.4s ease infinite}
.ov-dot:nth-child(2){animation-delay:.22s}.ov-dot:nth-child(3){animation-delay:.44s}
@keyframes dp{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.7;transform:scale(1.5)}}

/* результат — лейбл + архетип = одна группа */
.ov-arch{
  font-size:24px;font-weight:600;color:var(--acc);
  letter-spacing:-.01em;line-height:1;margin-top:4px;
  text-align:center;
  opacity:0;transform:translateY(4px);
  transition:opacity .4s,transform .4s;
}
.ov-arch.s{opacity:1;transform:none}

/* статус — отделён воздухом */
.ov-confirm{
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--t3);margin-top:24px;
  opacity:0;transition:opacity .4s;
}
.ov-confirm.s{opacity:1}

/* ══ СТРАНИЦА: fixed, flex-column ══ */
.page{
  position:fixed;inset:0;max-width:390px;margin:0 auto;
  display:flex;flex-direction:column;
  opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s;
}
.page.show{opacity:1;transform:none}

/* HEADER */
.hdr{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  padding-top:max(calc(env(safe-area-inset-top,0px) + 8px), 24px);
  padding-bottom:8px;
  padding-left:20px;
  padding-right:20px;
}
.m-logo{
  font-size:24px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--bg);text-shadow:-1px -1px 1px rgba(0,0,0,0.2),1px 1px 1px rgba(255,255,255,0.75),0 0 3px rgba(0,0,0,0.04);
}

/* SCROLL: flex:1, padding-bottom резервирует место под CTA */
.scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:0 20px calc(env(safe-area-inset-bottom,0px) + 120px);
  -webkit-overflow-scrolling:touch;
}
.scroll::-webkit-scrollbar{display:none}

/* CTA: fixed bottom */
.cta-wrap{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 16px);
  background:linear-gradient(to bottom,rgba(239,239,238,0) 0%,rgba(239,239,238,1) 28%);
  z-index:20;pointer-events:none;
}
.cta-btn{
  pointer-events:auto;
  width:100%;height:56px;
  background:var(--acc);color:#fff;
  border-top:1px solid rgba(255,255,255,0.35);
  border-left:1px solid rgba(255,255,255,0.25);
  border-bottom:1px solid rgba(0,0,0,0.15);
  border-right:1px solid rgba(0,0,0,0.1);
  border-radius:var(--r);
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .12s;position:relative;overflow:visible;
}
.cta-btn:active{transform:scale(0.98);opacity:.88}
@keyframes btnPulse{
  0%{box-shadow:0 0 0 0 rgba(255,111,97,0)}
  40%{box-shadow:0 0 0 6px rgba(255,111,97,0.3)}
  100%{box-shadow:0 0 0 0 rgba(255,111,97,0)}
}
.cta-btn.pulse{animation:btnPulse 2.0s ease 0s 1}
.cta-note{
  pointer-events:none;text-align:center;
  font-size:10px;color:var(--t3);margin-top:8px;letter-spacing:.04em;
}
.spark-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.spark-svg path{fill:none;stroke:rgba(255,111,97,0.45);stroke-width:0.8;stroke-linecap:round;stroke-dasharray:0 9999;opacity:0}
@keyframes sparkAnim{0%{stroke-dasharray:0 9999;opacity:0}6%{opacity:1}75%{stroke-dasharray:9999 0;opacity:.75}100%{stroke-dasharray:9999 0;opacity:0}}
.spark-svg.run path{animation:sparkAnim 1.8s cubic-bezier(.3,0,.2,1) forwards}
@keyframes sparkPulse{0%{stroke-dasharray:0 9999;opacity:0}10%{opacity:.5}50%{opacity:.3}68%{stroke-dasharray:9999 0;opacity:.15}100%{stroke-dasharray:9999 0;opacity:0}}
.spark-svg.pulse path{animation:sparkPulse 3.5s cubic-bezier(.25,0,.2,1) infinite}

/* ══ HERO ══ */
.hero{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0 24px;
  opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;
}
.hero.vis{opacity:1;transform:none}
.hero-ring-wrap{position:relative;width:119px;height:119px;margin-bottom:4px;perspective:600px;}
.hero-ring-inner{
  position:absolute;inset:2px;border-radius:50%;
  background:rgba(74,158,255,0.04);
  border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.hero-ring-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-initials{font-size:24px;font-weight:300;color:rgba(0,0,0,0.22)}
.hero-name{font-size:12px;color:var(--t3);letter-spacing:.04em;margin-bottom:2px;text-align:center}
.hero-arch{font-size:26px;font-weight:700;color:var(--t1);letter-spacing:-.01em;margin-bottom:4px;text-align:center}
.arch-char{display:inline-block;opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s}
.arch-char.in{opacity:1;transform:none}
.hero-rarity{font-size:10px;color:var(--t3);letter-spacing:.04em;text-align:center;transition:opacity .4s;min-height:14px}

/* ══ SECTION LABEL ══ */
.sl{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--t3);
  margin-top:32px;margin-bottom:16px;
}
.sl-line{width:1px;height:10px;background:rgba(255,111,97,0.4);flex-shrink:0}
.sl-hot{color:var(--acc)}

/* ══ CARD ══ */
.card{
  width:100%;border-radius:var(--r);
  background:rgba(255,111,97,0.04);
  border:none;
  overflow:hidden;margin-bottom:12px;
  opacity:0;transform:translateY(8px);transition:opacity .35s,transform .35s;
}
.card.vis{opacity:1;transform:none}

/* ══ ИНСАЙТ ══ */
.ins-wrap{padding:16px 16px 16px}
.ins-label{
  font-size:13px;font-weight:600;letter-spacing:-.01em;
  color:var(--t1);margin-bottom:12px;
}
.ins-row{display:flex;align-items:center;gap:12px}
.ins-ico{
  width:36px;height:36px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.ins-ico svg{width:16px;height:16px;fill:none;stroke:var(--acc);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.ins-body{flex:1}
.ins-title{font-size:14px;font-weight:600;color:var(--t1);line-height:1.2}
.ins-sub{font-size:11px;color:var(--t3);margin-top:2px}
.ins-text{
  font-size:14px;color:var(--t2);line-height:1.7;
  margin-top:14px;padding-top:14px;
  border-top:1px solid rgba(0,0,0,0.05);
  position:relative;
}
.ins-text-inner{
  display:-webkit-box;-webkit-line-clamp:9;-webkit-box-orient:vertical;overflow:hidden;
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
.ins-text-inner.expanded{
  display:block;-webkit-line-clamp:unset;
}
.ins-fade{
  position:absolute;bottom:22px;left:0;right:0;height:40px;
  background:linear-gradient(to bottom,rgba(240,237,235,0),rgba(240,237,235,1));
  pointer-events:none;transition:opacity .3s ease;
}
.ins-fade.hidden{opacity:0;}
.ins-more{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:20px;margin:4px auto 0;
  cursor:pointer;-webkit-tap-highlight-color:transparent;color:var(--t2);opacity:0.4;
  touch-action:manipulation;
}
.ins-more:active{color:var(--acc);}
.ins-more svg{transition:transform .35s cubic-bezier(.4,0,.2,1);}
.ins-more.expanded svg{transform:rotate(180deg);}


/* ══ ЭНЕРГИИ ══ */
.ef-wrap{padding:16px 16px 0}

/* столбцы */
.ef-cols{display:flex;align-items:flex-end}
.ef-col{
  flex:1;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  position:relative;
}
.ef-col+.ef-col::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;
  width:1px;background:rgba(0,0,0,0.06);
}
.ef-ico{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.ef-ico svg{width:18px;height:18px;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.4}
.ef-col:nth-child(1) .ef-ico svg{stroke:#4A9EFF;opacity:1}
.ef-col:nth-child(2) .ef-ico svg{stroke:#7BA8E0;opacity:0.85}
.ef-col:nth-child(3) .ef-ico svg{stroke:#C48AB0;opacity:0.70}
.ef-col:nth-child(4) .ef-ico svg{stroke:var(--t2)}
.ef-col:nth-child(5) .ef-ico svg{stroke:var(--t2)}

.ef-bar-wrap{
  width:28px;height:64px;position:relative;
  border-top:1px solid rgba(0,0,0,0.10);
  border-left:1px solid rgba(0,0,0,0.07);
  border-bottom:1px solid rgba(255,255,255,0.55);
  border-right:1px solid rgba(255,255,255,0.45);
  border-radius:3px;overflow:hidden;background:rgba(0,0,0,0.04);
}
.ef-fill{position:absolute;bottom:0;left:0;right:0;height:0%;border-radius:2px 2px 0 0}
.ef-col:nth-child(1) .ef-fill{background:rgba(74,158,255,0.70)}
.ef-col:nth-child(2) .ef-fill{background:rgba(123,168,224,0.55)}
.ef-col:nth-child(3) .ef-fill{background:rgba(196,138,176,0.45)}
.ef-col:nth-child(4) .ef-fill{background:rgba(0,0,0,0.12)}
.ef-col:nth-child(5) .ef-fill{background:rgba(0,0,0,0.07)}
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.04)}}
.ef-fill.dom{transform-origin:bottom;animation:breathe 3s ease-in-out infinite}

.ef-name{
  font-size:8px;letter-spacing:.06em;text-transform:uppercase;
  text-align:center;margin-top:6px;padding-bottom:4px;
}
.ef-col:nth-child(1) .ef-name{color:rgba(74,158,255,1)}
.ef-col:nth-child(2) .ef-name{color:rgba(74,158,255,0.75)}
.ef-col:nth-child(3) .ef-name{color:var(--t2)}
.ef-col:nth-child(4) .ef-name{color:var(--t2)}
.ef-col:nth-child(5) .ef-name{color:var(--t2)}

/* HINT — строго снизу столбцов, по центру, как в DOVOD */
.ef-hint{
  text-align:center;
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);
  padding:14px 0 14px;
  transition:opacity .2s;
}

/* inline desc — появляется между hint и нижним краем карточки */
.ef-desc{
  margin:0 16px 16px;
  padding:10px 14px;
  border-radius:10px;
  border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br);
  display:none;
}
.ef-desc.show{display:block}
.ef-desc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ef-desc-ico{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ef-desc-ico svg{width:14px;height:14px;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.5}
.ef-desc-title{font-size:11px;font-weight:600;color:var(--t1)}
.ef-desc-pct{font-size:10px;color:var(--t3);margin-left:auto}
.ef-desc-text{font-size:11px;color:var(--t2);line-height:1.6}

/* ══ АККОРДЕОНЫ — БЕЗ ЗАМКОВ ══ */
.acc-item{
  border-top:1px solid rgba(0,0,0,0.05);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.acc-item:first-child{border-top:none}
.acc-lock-ico{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:0}
.acc-head{
  display:flex;align-items:center;
  padding:14px 16px;gap:10px;
}
.acc-head:active{opacity:.7}
.acc-texts{flex:1;min-width:0}
.acc-title{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-sub{font-size:11px;color:var(--t3)}
.acc-arr{
  width:16px;height:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;opacity:.4;
}
.acc-arr svg{width:16px;height:16px;stroke:var(--t2);stroke-width:1.5;fill:none;stroke-linecap:round;transition:transform .2s}
.acc-item.open .acc-arr svg{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
.acc-item.open .acc-body{max-height:2000px}
.acc-body-in{
  padding:0 16px 14px 16px;
  font-size:13px;color:var(--t2);line-height:1.65;
  filter:blur(3.5px);user-select:none;pointer-events:none;
  background:rgba(0,0,0,0.03);
}
.acc-body-in.acc-open{
  filter:none;user-select:auto;pointer-events:auto;
}
</style>
</head>
<body>

<!-- OVERLAY -->
<div class="ov" id="ov">
  <div class="ov-group">
    <div class="ov-phase" id="ovPhase">анализ</div>
    <div class="ov-msg" id="ovMsg"></div>
    <div class="ov-dots" id="ovDots">
      <div class="ov-dot"></div><div class="ov-dot"></div><div class="ov-dot"></div>
    </div>
    <div class="ov-arch" id="ovArch"></div>
    <div class="ov-confirm" id="ovConfirm">определён</div>
  </div>
</div>

<!-- СТРАНИЦА -->
<div class="page" id="page">

  <div class="hdr">
    <div class="m-logo">MARU</div>
  </div>

  <div class="scroll">

    <!-- HERO -->
    <div class="hero" id="hero">
      <div class="hero-ring-wrap">
        <div class="hero-gyro" id="heroGyro" style="position:relative;width:119px;height:119px;transition:transform .15s ease-out;will-change:transform">
        <div class="hero-ring-inner" id="heroAv"><svg viewBox="0 0 200 200" width="100%" height="100%"><rect width="200" height="200" fill="#d0d0d0"/><circle cx="100" cy="80" r="30" fill="#b8b8b8"/><ellipse cx="100" cy="160" rx="50" ry="35" fill="#b8b8b8"/></svg></div>
        </div>
      </div>
      <div class="hero-name" id="heroName"></div>
      <div class="hero-arch" id="heroArch"></div>
      <div class="hero-rarity" id="heroRarity">один из 30 архетипов</div>
    </div>

    <div class="her-context" id="herContext" style="font-size:13px;color:var(--t2);line-height:1.6;text-align:center;padding:0 12px 16px;opacity:0;transform:translateY(4px);transition:opacity .5s,transform .5s;"></div>

    <div class="card" id="c0">
      <div class="ins-wrap">
        <div class="ins-label">Его природа</div>
        <div class="ins-text" id="insText">
          <div class="ins-text-inner" id="insTextInner"></div>
          <div class="ins-fade" id="insFade"></div>
        </div>
        <button class="ins-more" id="insMore" onclick="toggleInsText()" style="background:none;border:none;outline:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    </div>

    <!-- ЭНЕРГИИ убраны до оплаты — перенесены в screen6 -->

    <!-- РАЗДЕЛИТЕЛЬ -->
    <div style="margin:20px 0 20px;text-align:center">
      <span style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--t1);opacity:0.7">полный ответ</span>
    </div>

    <!-- АККОРДЕОНЫ -->
    <div class="card" id="c2" style="background:transparent;border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br)">
      <div id="accList"></div>
    </div>

  </div><!-- /scroll -->

  <!-- CTA -->
  <div class="cta-wrap" id="ctaWrap" style="opacity:0;transition:opacity .4s">
    <button class="cta-btn" id="ctaBtn" onclick="goToPay()">
      <span id="ctaTxt">Получить полный ответ</span>
      <svg class="spark-svg" id="sparkSvg"><path id="sparkPath"/></svg>
    </button>
    <div class="cta-note">Единоразово · доступ навсегда</div>
  </div>

</div><!-- /page -->

<script>
(function(){

var tg=window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null;
if(tg){tg.ready();tg.expand();try{tg.setBackgroundColor('#efefee');tg.setHeaderColor('#efefee');}catch(e){}}
function hap(t){
  try{if(tg)tg.HapticFeedback.impactOccurred(t==='m'?'medium':'light');}catch(e){}
  try{if(navigator.vibrate)navigator.vibrate(t==='m'?14:7);}catch(e){}
}

/* данные */
var D={archetype:'Режиссер',scores:{СМ:32,Ф:28,ЗН:18,Э:12,ЗВ:10},gender:'М'};
try{
  var b=JSON.parse(localStorage.getItem('maru_block1')||'{}');
  if(b.archetypeName)D.archetype=b.archetypeName;
  if(b.scores)D.scores=b.scores;
  if(b.gender)D.gender=b.gender;
}catch(e){}
var male=D.gender==='М';
/* CTA текст по гендеру */
var ctaEl=document.getElementById('ctaTxt');
if(ctaEl)ctaEl.textContent='ПОЛУЧИТЬ ПОЛНЫЙ ОТВЕТ';
var ARCHETYPES_URL='https://cdn.jsdelivr.net/gh/MARU-hub22/maru-data@main/maru_archetypes.json';
var NAMES_MAP={'Конвертер':'konverter','Методолог':'metodolog','Теоретик':'teoretik','Режиссер':'rezhisser','Транслятор':'translyator','Генератор':'generator','Полемик':'polemik','Аналитик':'analitik','Оракул':'orakul','Созерцатель':'sozertatel','Концептуалист':'kontseptualist','Интерпретатор':'interpretator','Идеолог':'ideolog','Дизайнер':'dizayner','Инструктор':'instruktor','Педагог':'pedagog','Лидер':'lider','Ментор':'mentor','Продавец':'prodavets','Герой':'geroy','Командир':'komandir','Философ':'filosof','Историк':'istorik','Наставник':'nastavnik','Инженер':'inzhener','Декоратор':'dekorator','Законодатель':'zakonodatel','Продюсер':'produser','Драматург':'dramaturg','Агент':'agent'};
function loadArchetypeData(){
  var slug=NAMES_MAP[D.archetype]; if(!slug)return;
  try{var c=JSON.parse(localStorage.getItem('maru_archetype_data')||'null');if(c&&c.blocks&&c.blocks.description){applyArch(c);return;}else{localStorage.removeItem('maru_archetype_data');}}catch(e){}
  fetch(ARCHETYPES_URL).then(function(r){return r.json();}).then(function(data){
    var arch=data.archetypes&&data.archetypes[slug];
    if(arch){try{localStorage.setItem('maru_archetype_data',JSON.stringify(arch));}catch(e){} applyArch(arch);}
  }).catch(function(e){});
}
function applyArch(arch){

function animBars(){
  var st=null,done=false,T=7000,R=1400;
  function fr(ts){
    if(!st)st=ts;var el=ts-st;
    if(el>=T&&!done){
      done=true;
      fills.forEach(function(f,i){
        setTimeout(function(){
          var fe=document.getElementById(f.id);if(!fe)return;
          fe.style.transition='height .65s cubic-bezier(.22,1,.36,1)';
          fe.style.height=f.pct+'%';
          hap('l');
        },i*120);
      });
      return;
    }
    if(done)return;
    var ph=el/T,rp=Math.min(el/R,1),re=1-Math.pow(1-rp,3);
    fills.forEach(function(f,i){
      var fe=document.getElementById(f.id);if(!fe)return;
      var w=Math.sin(el*(0.004+i*0.0009)+i*1.3)*9*(1-ph*0.82)*(rp>.5?1:rp/.5);
      fe.style.transition='none';
      fe.style.height=Math.max(2,Math.min(100,re*f.pct+w))+'%';
    });
    requestAnimationFrame(fr);
  }
  requestAnimationFrame(fr);
}

/* гироскоп hero ring */
(function(){
  var el=document.getElementById('heroGyro');
  if(!el)return;
  var mx=12,hasGyro=false;
  function tilt(x,y){el.style.transform='rotateY('+x+'deg) rotateX('+y+'deg)';}
  function startGyro(){
    var base=null;
    window.addEventListener('deviceorientation',function(e){
      if(e.gamma===null)return;
      hasGyro=true;
      if(!base)base={g:e.gamma,b:e.beta};
      var dx=Math.max(-mx,Math.min(mx,(e.gamma-base.g)*0.6));
      var dy=Math.max(-mx,Math.min(mx,(e.beta-base.b)*-0.6));
      tilt(dx,dy);
    });
  }
  if(window.DeviceOrientationEvent){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      /* iOS 13+ требует разрешения */
      document.addEventListener('touchstart',function reqPerm(){
        DeviceOrientationEvent.requestPermission().then(function(s){
          if(s==='granted')startGyro();
        }).catch(function(){});
        document.removeEventListener('touchstart',reqPerm);
      },{once:true});
    } else {
      startGyro();
    }
  }
  document.addEventListener('mousemove',function(e){
    hasGyro=true;
    var cx=window.innerWidth/2,cy=window.innerHeight/2;
    tilt(((e.clientX-cx)/cx)*mx,((e.clientY-cy)/cy)*-mx);
  });
  /* fallback: мягкое покачивание если нет ни гироскопа ни мыши */
  setTimeout(function(){
    if(hasGyro)return;
    var t=0;
    (function sway(){
      t+=0.02;
      tilt(Math.sin(t)*4,Math.cos(t*0.7)*3);
      requestAnimationFrame(sway);
    })();
  },2000);
})();
