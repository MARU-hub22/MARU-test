<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU · Оплата</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  background:var(--bg);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  user-select:none;
  -webkit-user-select:none;
  font-family:'Inter',-apple-system,sans-serif;
}

/* ── PAGE ── */
.page{
  position:fixed;
  inset:0;
  max-width:390px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .45s,transform .45s;
}
.page.show{opacity:1;transform:none}

/* ── HEADER ──
   safe-area + 48px сверху даёт достаточно воздуха на любом устройстве
*/
.hdr{
  flex-shrink:0;
  padding-top:max(calc(env(safe-area-inset-top,0px) + 8px), 24px);
  padding-left:20px;
  padding-right:20px;
  padding-bottom:8px;
}
.hdr-row{
  width:100%;
  height:44px;
  display:flex;
  align-items:center;
}
.m-logo{
  flex:1;
  text-align:center;
  font-size:24px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--bg);
  text-shadow:-1px -1px 1px rgba(0,0,0,0.2),1px 1px 1px rgba(255,255,255,0.75),0 0 3px rgba(0,0,0,0.04);
}
.btn-back{
  width:44px;
  height:44px;
  flex-shrink:0;
  border-radius:10px;
  border-top:var(--bt);
  border-left:var(--bl);
  border-bottom:var(--bb);
  border-right:var(--br);
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.btn-back:active{transform:scale(0.9);opacity:.6;}
.btn-back svg{
  width:14px;
  height:14px;
  stroke:var(--t2);
  stroke-width:2;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.spacer{width:44px;flex-shrink:0;}

/* ── IDENTITY CARD — Вариант А ── */
@keyframes cardPulse{
  0%,100%{border-top-color:rgba(0,0,0,0.08);border-left-color:rgba(0,0,0,0.06);border-bottom-color:rgba(255,255,255,0.55);border-right-color:rgba(255,255,255,0.45)}
  50%{border-top-color:rgba(255,111,97,0.5);border-left-color:rgba(255,111,97,0.4);border-bottom-color:rgba(255,111,97,0.3);border-right-color:rgba(255,111,97,0.25)}
}
.identity-card{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:24px;
  margin-left:50%;
  transform:translateX(-50%);
  padding:8px 14px;
  border-radius:10px;
  border-top:1px solid rgba(0,0,0,0.08);
  border-left:1px solid rgba(0,0,0,0.06);
  border-bottom:1px solid rgba(255,255,255,0.55);
  border-right:1px solid rgba(255,255,255,0.45);
  background:transparent;
  animation:cardPulse 3s ease-in-out infinite;
}
.identity-card .id-lock svg{
  width:16px;
  height:16px;
  stroke:var(--acc);
  stroke-width:2;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}
@keyframes lockShake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-3px)}
  40%{transform:translateX(3px)}
  60%{transform:translateX(-2px)}
  80%{transform:translateX(1px)}
  100%{transform:translateX(0)}
}
.identity-card.shake{animation:lockShake .3s ease}
.identity-card .id-arch{
  font-size:15px;
  font-weight:600;
  color:var(--acc);
  letter-spacing:-.01em;
}
.identity-card .id-sep{
  width:1px;
  height:10px;
  background:rgba(0,0,0,0.1);
  flex-shrink:0;
}
.identity-card .id-status{
  font-size:10px;
  color:var(--t3);
  letter-spacing:.04em;
}

/* ── SCROLL ──
   padding-bottom = высота CTA-блока:
   24px top gradient + 56px button + 12px note + 20px timer + 36px bottom = ~148px
   Берём 160px с запасом
*/
.scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:0 24px calc(env(safe-area-inset-bottom,0px) + 172px);
  -webkit-overflow-scrolling:touch;
}
.scroll::-webkit-scrollbar{display:none}

/* ── MANIFESTO ── 24px от header */
.manifesto{
  margin-top:24px;
  padding-bottom:0;
  opacity:0;
  transform:translateY(6px);
  transition:opacity .4s,transform .4s;
}
.manifesto.vis{opacity:1;transform:none}
.manifesto-text{
  font-size:13px;
  color:var(--t2);
  line-height:1.7;
  font-weight:400;
}
.manifesto-title{
  font-size:20px;
  font-weight:600;
  color:var(--t1);
  line-height:1.3;
  letter-spacing:-.02em;
  margin-bottom:12px;
}
.manifesto-sig{
  margin-top:20px;
  font-size:10px;
  color:var(--t3);
  letter-spacing:.04em;
  font-style:italic;
  font-weight:300;
}
.manifesto-sig b{color:var(--t2);font-weight:400;font-style:italic;}

/* ── PRICE CARD ── 24px от identity-card */
.price-card{
  margin-top:24px;
  width:100%;
  border-radius:var(--r);
  background:transparent;
  border-top:var(--bt);
  border-left:var(--bl);
  border-bottom:var(--bb);
  border-right:var(--br);
  padding:12px 24px 16px;
  position:relative;
  text-align:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  opacity:0;
  transform:translateY(6px);
  transition:opacity .4s,transform .4s;
}
.price-card.vis{opacity:1;transform:none}
.price-lbl{
  font-size:9px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--t3);
  margin-bottom:12px;
  line-height:1;
}
.price-info-btn{
  position:absolute;
  top:14px;
  right:16px;
  width:16px;
  height:16px;
  border-radius:50%;
  border-top:var(--bt);
  border-left:var(--bl);
  border-bottom:var(--bb);
  border-right:var(--br);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  font-weight:400;
  color:var(--t3);
  font-style:italic;
  background:transparent;
  cursor:pointer;
  padding:0;
  line-height:1;
  -webkit-tap-highlight-color:transparent;
}
.price-info-btn:active{opacity:.5}
.price-row{
  display:flex;
  align-items:baseline;
  gap:4px;
  justify-content:center;
}
.price-amount{
  font-size:32px;
  font-weight:700;
  color:var(--acc);
  letter-spacing:-.03em;
  line-height:1;
  animation:priceBreathe 4s ease-in-out infinite;
}
@keyframes priceBreathe{0%,100%{opacity:1}50%{opacity:.55}}
.price-cur{font-size:14px;font-weight:300;color:var(--acc);}
.price-desc{
  font-size:11px;
  color:var(--t3);
  margin-top:6px;
  letter-spacing:.02em;
}
.price-tooltip{
  font-size:11px;
  color:var(--acc);
  text-align:center;
  margin-top:6px;
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:max-height .28s ease,opacity .28s ease;
}
.price-tooltip.show{max-height:20px;opacity:1}
@keyframes tipPulse{0%,100%{opacity:1}50%{opacity:.5}}
.price-tooltip.pulse-tip{animation:tipPulse 2s ease-in-out infinite}

/* ── COUNTER ── 20px от цены */
.counter-line{
  margin-top:24px;
  text-align:center;
  font-size:11px;
  font-weight:500;
  min-height:16px;
  opacity:0;
  transition:opacity .4s;
}
.counter-line.vis{opacity:1}



/* ── CTA ── fixed bottom ── */
.cta-wrap{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:390px;
  padding-top:20px;
  padding-left:20px;
  padding-right:20px;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px);
  background:linear-gradient(to bottom,rgba(239,239,238,0) 0%,rgba(239,239,238,1) 40%);
  z-index:20;
  pointer-events:none;
  opacity:0;
  transition:opacity .4s;
}
.cta-wrap.vis{opacity:1}
.cta-btn{
  pointer-events:auto;
  position:relative;
  width:100%;
  height:56px;
  border-radius:var(--r);
  background:var(--acc);
  border-top:1px solid rgba(255,255,255,0.35);
  border-left:1px solid rgba(255,255,255,0.25);
  border-bottom:1px solid rgba(0,0,0,0.15);
  border-right:1px solid rgba(0,0,0,0.1);
  color:#fff;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:transform .12s,opacity .12s;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
}
.cta-btn:active{transform:scale(0.98);opacity:.7}
.cta-btn:focus{outline:none}
.cta-main{
  font-size:11px;
  font-weight:600;
  letter-spacing:.16em;
  text-transform:uppercase;
  line-height:1;
}
.cta-sub{
  font-size:9px;
  font-weight:400;
  letter-spacing:.08em;
  color:rgba(255,255,255,0.65);
  text-transform:lowercase;
  line-height:1;
}
.spark-svg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:visible;
}
.spark-svg path{
  fill:none;
  stroke:rgba(255,255,255,0.7);
  stroke-width:1.5;
  stroke-linecap:round;
  stroke-dasharray:0 9999;
  opacity:0;
}
@keyframes sparkAnim{
  0%{stroke-dasharray:0 9999;opacity:0}
  6%{opacity:1}
  75%{stroke-dasharray:9999 0;opacity:.6}
  100%{stroke-dasharray:9999 0;opacity:0}
}
.spark-svg.run path{animation:sparkAnim 1.6s cubic-bezier(.3,0,.2,1) forwards}
@keyframes btnPulse{
  0%{box-shadow:0 0 0 0 rgba(255,111,97,0)}
  40%{box-shadow:0 0 0 6px rgba(255,111,97,0.3)}
  100%{box-shadow:0 0 0 0 rgba(255,111,97,0)}
}
.cta-btn.pulse{animation:btnPulse 2.0s ease 0s 1}
.cta-note{
  pointer-events:none;
  text-align:center;
  font-size:10px;
  color:var(--t3);
  margin-top:12px;
  letter-spacing:.02em;
}
.timer-note{
  pointer-events:none;
  text-align:center;
  font-size:11px;
  color:var(--t2);
  margin-top:10px;
  letter-spacing:.02em;
}
.timer-note span{
  color:var(--acc);
  font-variant-numeric:tabular-nums;
  font-weight:600;
}
</style>
</head>
<body>
<div class="page" id="page">

  <div class="hdr">
    <div class="hdr-row">
      <div class="spacer"></div>
      <div class="m-logo">MARU</div>
      <button class="btn-back" onclick="goBackS5()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
  </div>

  <div class="scroll">

    <div class="manifesto" id="manifesto">
      <div class="manifesto-title">Тест пройден. Результат готов.</div>
      <div class="manifesto-text">Осталось увидеть целиком — и перестать тревожиться.</div>
    </div>

    <!-- sunk cost и counter убраны — чистая иерархия -->

    <div class="identity-card" onclick="shakeCard(this)">
      <div class="id-lock"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <div class="id-arch" id="idArch"></div>
      <div class="id-sep"></div>
      <div class="id-status">ожидает тебя</div>
    </div>

    <div class="price-card" id="priceCard" onclick="toggleTooltip()">
      <div class="price-lbl">Один раз</div>
      <!-- info btn убран: tooltip auto-show -->
      <div class="price-row">
        <div class="price-amount">1490</div>
        <div class="price-cur">₽</div>
      </div>
      <div class="price-desc">Полный доступ к результатам · навсегда</div>
      <div class="price-tooltip" id="priceTooltip">у психолога от 12 000 ₽</div>
    </div>

    <div style="text-align:center;font-size:12px;font-style:italic;color:var(--t2);line-height:1.6;margin-top:20px;padding:0 16px;opacity:0;transition:opacity .4s" id="testimonial">«Я наконец перестала додумывать за него»</div>

  </div>

  <div class="cta-wrap" id="ctaWrap">
    <button class="cta-btn" id="ctaBtn" onclick="hap('m');goPay();">
      <span class="cta-main">ПОЛУЧИТЬ СВОЙ ОТВЕТ</span>
      <svg class="spark-svg" id="sparkSvg"><path id="sparkPath"/></svg>
    </button>
    <div class="cta-note">1490₽ · Безопасная оплата · Доступ сразу</div>
  </div>

</div>
<script>
(function(){
var tg=window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null;
if(tg){tg.ready();tg.expand();try{tg.setBackgroundColor('#efefee');tg.setHeaderColor('#efefee');}catch(e){}}

window.shakeCard=function(el){
  hap('m');
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  el.addEventListener('animationend',function(){el.classList.remove('shake');},{once:true});
};

window.hap=function(t){
  try{if(tg)tg.HapticFeedback.impactOccurred(t==='m'?'medium':'light');}catch(e){}
  try{if(navigator.vibrate)navigator.vibrate(t==='m'?14:7);}catch(e){}
};

/* архетип и имя из screen5 + TG */
var arch='';
try{var b=JSON.parse(localStorage.getItem('maru_block1')||'{}');arch=b.archetypeName||b.archetype||'';}catch(e){}
document.getElementById('idArch').textContent=arch||'Архетип';

/* имя из TG */
var userName='';
try{var u=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user;if(u&&u.first_name)userName=u.first_name;}catch(e){}
/* tooltip */
var tooltipOpen=false;
window.toggleTooltip=function(){
  hap('l');
  tooltipOpen=!tooltipOpen;
  document.getElementById('priceTooltip').classList.toggle('show',tooltipOpen);
};
/* auto-show tooltip через 5 сек, держится 8 сек */
setTimeout(function(){
  if(!tooltipOpen){
    tooltipOpen=true;
    var tt=document.getElementById('priceTooltip');
    tt.classList.add('show','pulse-tip');
    setTimeout(function(){
      tooltipOpen=false;
      tt.classList.remove('show','pulse-tip');
    },8000);
  }
},5000);

/* «С возвращением» — если уже была на этом экране */
var returnKey='maru_saw_paywall';
var isReturn=false;
try{isReturn=!!localStorage.getItem(returnKey);}catch(e){}
try{localStorage.setItem(returnKey,'1');}catch(e){}
var mTitle=document.getElementById('manifesto').querySelector('.manifesto-title');
var mText=document.getElementById('manifesto').querySelector('.manifesto-text');
if(isReturn&&mTitle&&mText){
  mTitle.textContent='С возвращением. Твой результат всё ещё ждёт.';
  mText.textContent='Осталось увидеть целиком — и перестать тревожиться.';
}

/* stagger */
setTimeout(function(){document.getElementById('page').classList.add('show');},60);
setTimeout(function(){document.getElementById('manifesto').classList.add('vis');},180);
/* sunkCost убран */
setTimeout(function(){
  document.getElementById('priceCard').classList.add('vis');
  document.getElementById('timerNote').style.opacity='1';
},600);
setTimeout(function(){document.getElementById('testimonial').style.opacity='1';},700);
/* counterNote убран */
setTimeout(function(){
  document.getElementById('ctaWrap').classList.add('vis');
  setTimeout(runSpark,200);
  setTimeout(function(){
    var btn=document.getElementById('ctaBtn');
    btn.classList.remove('pulse');
    btn.offsetHeight;
    btn.classList.add('pulse');
    btn.addEventListener('animationend',function(){btn.classList.remove('pulse');},{once:true});
  },400);
},900);

function runSpark(){
  var btn=document.getElementById('ctaBtn');
  var svg=document.getElementById('sparkSvg');
  var path=document.getElementById('sparkPath');
  var w=btn.offsetWidth,h=btn.offsetHeight,r=16;
  path.setAttribute('d','M'+r+','+(h-1)+' L'+(w-r)+','+(h-1)+' Q'+(w-1)+','+(h-1)+' '+(w-1)+','+(h-r)+' L'+(w-1)+','+r);
  svg.classList.remove('run');
  void svg.offsetWidth;
  svg.classList.add('run');
  svg.addEventListener('animationend',function(){svg.classList.remove('run');},{once:true});
}

/* 4. CTA с haptic */
window.goPay=function(){
  hap('m');
  try{if(tg)tg.HapticFeedback.notificationOccurred('success');}catch(e){}
  try{if(navigator.vibrate)navigator.vibrate([14,50,14]);}catch(e){}
  runSpark();
  setTimeout(function(){goTo('screen6.html');},600);
};
function goTo(url){
  document.body.style.transition='opacity .25s ease';
  document.body.style.opacity='0';
  setTimeout(function(){window.location.href=url;},250);
}
window.goBackS5=function(){
  hap('l');
  document.body.style.transition='opacity .25s ease';
  document.body.style.opacity='0';
  setTimeout(function(){window.location.href='screen4.html';},250);
};

/* таймер убран — честный urgency через текст */

/* counter убран */

/* двойной переход убран — goPay() уже делает goTo */
})();
</script>
</body>
</html>
