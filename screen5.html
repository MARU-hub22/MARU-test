<!DOCTYPE html><!-- v=101043 -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;background:#e8e8e8;overflow:hidden;
  -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
  font-family:'Inter',-apple-system,sans-serif;
}

/* ══ ДИЗАЙН-ТОКЕНЫ ══ */
:root{
  --bg:#e8e8e8;
  --acc:#FF6B6B;
  --green:#70892E;
  --t1:#2c2c2c;
  --t2:#666;
  --t3:#999;
  /* гравюрный border */
  --bt:1px solid rgba(0,0,0,0.08);
  --bl:1px solid rgba(0,0,0,0.06);
  --bb:1px solid rgba(255,255,255,0.55);
  --br:1px solid rgba(255,255,255,0.45);
  /* 8pt сетка */
  --u:8px;
  --r:16px;
}

/* ══ OVERLAY ══ */
.ov{
  position:fixed;inset:0;z-index:999;
  display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(232,232,232,0.97);transition:opacity .5s;
}
.ov.hide{opacity:0;pointer-events:none}
.ov-card{
  width:100%;max-width:320px;padding:48px 32px 40px;border-radius:20px;
  background:transparent;
  border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br);
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.ov-symbol{
  width:80px;height:80px;border-radius:50%;
  border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:24px;position:relative;background:rgba(74,158,255,0.03);
}
.ov-symbol::before{
  content:'';position:absolute;inset:-1px;border-radius:50%;
  background:conic-gradient(rgba(74,158,255,0) 0%,rgba(74,158,255,0.32) 30%,rgba(74,158,255,0) 60%);
  animation:rotGlow 2.4s linear infinite;
}
@keyframes rotGlow{to{transform:rotate(360deg)}}
.ov-pen{position:relative;z-index:1;width:28px;height:28px;animation:penWrite 1.8s ease-in-out infinite;transform-origin:bottom left}
.ov-pen svg{width:28px;height:28px;stroke:rgba(74,158,255,0.80);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
@keyframes penWrite{
  0%  {transform:translate(0,0) rotate(-8deg)}
  25% {transform:translate(3px,-2px) rotate(2deg)}
  50% {transform:translate(6px,0) rotate(-4deg)}
  75% {transform:translate(3px,2px) rotate(4deg)}
  100%{transform:translate(0,0) rotate(-8deg)}
}
.ov-phase{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(74,158,255,0.55);margin-bottom:8px;min-height:14px}
.ov-arch{font-size:28px;font-weight:700;color:var(--t1);letter-spacing:-.01em;line-height:1.1;margin-bottom:8px;min-height:36px}
.ov-confirm{font-size:11px;color:var(--t3);margin-bottom:16px;min-height:16px;opacity:0;transition:opacity .4s;display:flex;align-items:center;justify-content:center;gap:6px}
.ov-confirm.s{opacity:1}
.ov-msg{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:32px;min-height:40px;padding:0 4px;opacity:0;transform:translateY(4px);transition:opacity .35s,transform .35s}
.ov-msg.s{opacity:1;transform:none}
.ov-dots{display:flex;gap:5px;margin-bottom:32px}
.ov-dot{width:4px;height:4px;border-radius:50%;background:var(--t3);opacity:.3;animation:dp 1.4s ease infinite}
.ov-dot:nth-child(2){animation-delay:.22s}.ov-dot:nth-child(3){animation-delay:.44s}
@keyframes dp{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* ══ СТРАНИЦА: fixed, flex-column ══ */
.page{
  position:fixed;inset:0;max-width:390px;margin:0 auto;
  display:flex;flex-direction:column;
  opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s;
}
.page.show{opacity:1;transform:none}

/* HEADER: высота = safe-area + 48px */
.hdr{
  flex-shrink:0;
  height:calc(env(safe-area-inset-top,0px) + 48px);
  display:flex;align-items:flex-end;justify-content:center;
  padding:0 20px 12px;
}
.m-logo{
  font-size:22px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--bg);text-shadow:-1px -1px 1px rgba(0,0,0,0.12),1px 1px 2px rgba(255,255,255,0.6);
}

/* SCROLL: flex:1, padding-bottom резервирует место под CTA */
.scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:0 20px calc(env(safe-area-inset-bottom,0px) + 120px);
  -webkit-overflow-scrolling:touch;
}
.scroll::-webkit-scrollbar{display:none}

/* CTA: fixed bottom */
.cta-wrap{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  padding:16px 20px calc(env(safe-area-inset-bottom,0px) + 16px);
  background:linear-gradient(to bottom,rgba(232,232,232,0) 0%,rgba(232,232,232,1) 25%);
  z-index:20;
}
.cta-btn{
  pointer-events:auto;
  width:100%;height:56px;
  background:transparent;color:var(--acc);
  border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br);
  border-radius:var(--r);
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.26em;text-transform:uppercase;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .12s;position:relative;overflow:visible;
}
.cta-btn:active{transform:scale(0.98)}
@keyframes btnPulse{
  0%{border-bottom-color:rgba(255,255,255,0.55);border-right-color:rgba(255,255,255,0.45)}
  40%{border-bottom-color:rgba(255,107,107,0.9);border-right-color:rgba(255,107,107,0.7)}
  100%{border-bottom-color:rgba(255,255,255,0.55);border-right-color:rgba(255,255,255,0.45)}
}
.cta-btn.pulse{animation:btnPulse 2.0s ease 0s 1}
.cta-note{
  pointer-events:none;text-align:center;
  font-size:10px;color:var(--t3);margin-top:8px;letter-spacing:.04em;
}
.spark-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.spark-svg path{fill:none;stroke:rgba(255,107,107,0.45);stroke-width:0.8;stroke-linecap:round;stroke-dasharray:0 9999;opacity:0}
@keyframes sparkAnim{0%{stroke-dasharray:0 9999;opacity:0}6%{opacity:.6}50%{opacity:.4}75%{stroke-dasharray:9999 0;opacity:.2}100%{stroke-dasharray:9999 0;opacity:0}}
.spark-svg.run path{animation:sparkAnim 2.2s cubic-bezier(.3,0,.15,1) forwards}
@keyframes sparkPulse{0%{stroke-dasharray:0 9999;opacity:0}10%{opacity:.5}50%{opacity:.3}68%{stroke-dasharray:9999 0;opacity:.15}100%{stroke-dasharray:9999 0;opacity:0}}
.spark-svg.pulse path{animation:sparkPulse 3.5s cubic-bezier(.25,0,.2,1) infinite}

/* ══ HERO ══ */
.hero{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0 24px;
  opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;
}
.hero.vis{opacity:1;transform:none}
.hero-ring-wrap{position:relative;width:96px;height:96px;margin-bottom:12px}
.hero-ring-svg{position:absolute;inset:0}
.hero-ring-inner{
  position:absolute;inset:12px;border-radius:50%;
  background:rgba(74,158,255,0.04);
  border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.hero-ring-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-initials{font-size:24px;font-weight:300;color:rgba(0,0,0,0.22)}
.hero-name{font-size:12px;color:var(--t3);letter-spacing:.04em;margin-bottom:4px;text-align:center}
.hero-arch{font-size:26px;font-weight:700;color:var(--t1);letter-spacing:-.01em;margin-bottom:6px;text-align:center}
.arch-char{display:inline-block;opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s}
.arch-char.in{opacity:1;transform:none}
.hero-rarity{font-size:10px;color:var(--t3);letter-spacing:.04em;text-align:center;transition:opacity .4s;min-height:14px}

/* ══ SECTION LABEL ══ */
.sl{
  display:flex;align-items:center;gap:8px;
  font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--t3);
  margin-top:24px;margin-bottom:8px;
}
.sl-line{width:1px;height:10px;background:rgba(255,107,107,0.4);flex-shrink:0}
.sl-hot{color:var(--acc)}

/* ══ CARD ══ */
.card{
  width:100%;border-radius:var(--r);background:transparent;
  border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br);
  overflow:hidden;
  opacity:0;transform:translateY(8px);transition:opacity .35s,transform .35s;
}
.card.vis{opacity:1;transform:none}

/* ══ ИНСАЙТ ══ */
.ins-wrap{padding:16px 16px 16px}
.ins-label{
  font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--t3);margin-bottom:12px;
}
.ins-row{display:flex;align-items:center;gap:12px}
.ins-ico{
  width:36px;height:36px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.ins-ico svg{width:16px;height:16px;fill:none;stroke:var(--acc);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.ins-body{flex:1}
.ins-title{font-size:14px;font-weight:600;color:var(--t1);line-height:1.2}
.ins-sub{font-size:11px;color:var(--t3);margin-top:2px}
.ins-text{
  font-size:13px;color:var(--t2);line-height:1.65;
  margin-top:12px;padding-top:12px;
  border-top:1px solid rgba(0,0,0,0.05);
  position:relative;
}
.ins-text-inner{
  display:-webkit-box;-webkit-line-clamp:9;-webkit-box-orient:vertical;overflow:hidden;
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
.ins-text-inner.expanded{
  display:block;-webkit-line-clamp:unset;
}
.ins-fade{
  position:absolute;bottom:22px;left:0;right:0;height:40px;
  background:linear-gradient(to bottom,rgba(232,232,232,0),rgba(232,232,232,1));
  pointer-events:none;transition:opacity .3s ease;
}
.ins-fade.hidden{opacity:0;}
.ins-more{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:20px;margin:4px auto 0;
  cursor:pointer;-webkit-tap-highlight-color:transparent;color:var(--t3);
  touch-action:manipulation;
}
.ins-more:active{color:var(--acc);}
.ins-more svg{transition:transform .35s cubic-bezier(.4,0,.2,1);}
.ins-more.expanded svg{transform:rotate(180deg);}


/* ══ ЭНЕРГИИ ══ */
.ef-wrap{padding:16px 16px 0}

/* столбцы */
.ef-cols{display:flex;align-items:flex-end}
.ef-col{
  flex:1;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  position:relative;
}
.ef-col+.ef-col::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;
  width:1px;background:rgba(0,0,0,0.06);
}
.ef-ico{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.ef-ico svg{width:18px;height:18px;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.4}
.ef-col:nth-child(1) .ef-ico svg{stroke:#4A9EFF;opacity:1}
.ef-col:nth-child(2) .ef-ico svg{stroke:#7BA8E0;opacity:0.85}
.ef-col:nth-child(3) .ef-ico svg{stroke:#C48AB0;opacity:0.70}
.ef-col:nth-child(4) .ef-ico svg{stroke:var(--t2)}
.ef-col:nth-child(5) .ef-ico svg{stroke:var(--t2)}

.ef-bar-wrap{
  width:28px;height:64px;position:relative;
  border-top:1px solid rgba(0,0,0,0.10);
  border-left:1px solid rgba(0,0,0,0.07);
  border-bottom:1px solid rgba(255,255,255,0.55);
  border-right:1px solid rgba(255,255,255,0.45);
  border-radius:3px;overflow:hidden;background:rgba(0,0,0,0.04);
}
.ef-fill{position:absolute;bottom:0;left:0;right:0;height:0%;border-radius:2px 2px 0 0}
.ef-col:nth-child(1) .ef-fill{background:rgba(74,158,255,0.70)}
.ef-col:nth-child(2) .ef-fill{background:rgba(123,168,224,0.55)}
.ef-col:nth-child(3) .ef-fill{background:rgba(196,138,176,0.45)}
.ef-col:nth-child(4) .ef-fill{background:rgba(0,0,0,0.12)}
.ef-col:nth-child(5) .ef-fill{background:rgba(0,0,0,0.07)}
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.04)}}
.ef-fill.dom{transform-origin:bottom;animation:breathe 3s ease-in-out infinite}

.ef-name{
  font-size:8px;letter-spacing:.06em;text-transform:uppercase;
  text-align:center;margin-top:6px;padding-bottom:4px;
}
.ef-col:nth-child(1) .ef-name{color:rgba(74,158,255,1)}
.ef-col:nth-child(2) .ef-name{color:rgba(74,158,255,0.75)}
.ef-col:nth-child(3) .ef-name{color:var(--t2)}
.ef-col:nth-child(4) .ef-name{color:var(--t2)}
.ef-col:nth-child(5) .ef-name{color:var(--t2)}

/* HINT — строго снизу столбцов, по центру, как в DOVOD */
.ef-hint{
  text-align:center;
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(0,0,0,0.28);
  padding:10px 0 14px;
  transition:opacity .2s;
}

/* inline desc — появляется между hint и нижним краем карточки */
.ef-desc{
  margin:0 16px 16px;
  padding:10px 14px;
  border-radius:10px;
  border-top:var(--bt);border-left:var(--bl);border-bottom:var(--bb);border-right:var(--br);
  display:none;
}
.ef-desc.show{display:block}
.ef-desc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ef-desc-ico{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ef-desc-ico svg{width:14px;height:14px;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.5}
.ef-desc-title{font-size:11px;font-weight:600;color:var(--t1)}
.ef-desc-pct{font-size:10px;color:var(--t3);margin-left:auto}
.ef-desc-text{font-size:11px;color:var(--t2);line-height:1.6}

/* ══ АККОРДЕОНЫ — БЕЗ ЗАМКОВ ══ */
.acc-item{
  border-top:1px solid rgba(0,0,0,0.05);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.acc-item:first-child{border-top:none}
.acc-lock-ico{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:0}
.acc-head{
  display:flex;align-items:center;
  padding:14px 16px;gap:10px;
}
.acc-head:active{opacity:.7}
.acc-texts{flex:1;min-width:0}
.acc-title{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-sub{font-size:11px;color:var(--t3)}
.acc-arr{
  width:16px;height:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;opacity:.25;
}
.acc-arr svg{width:16px;height:16px;stroke:var(--t2);stroke-width:1.5;fill:none;stroke-linecap:round;transition:transform .2s}
.acc-item.open .acc-arr svg{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.acc-item.open .acc-body{max-height:600px}
.acc-body-in{
  padding:0 16px 14px 16px;
  font-size:12px;color:var(--t2);line-height:1.6;
  filter:blur(3.5px);user-select:none;pointer-events:none;
  background:rgba(0,0,0,0.03);
}
</style>
</head>
<body>

<!-- OVERLAY -->
<div class="ov" id="ov">
  <div class="ov-card">
    <div class="ov-symbol">
      <div class="ov-pen">
        <svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
      </div>
    </div>
    <div class="ov-phase" id="ovPhase">анализ</div>
    <div class="ov-arch" id="ovArch">—</div>
    <div class="ov-confirm" id="ovConfirm">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" stroke-width="2" stroke-linecap="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
      Ваш архетип определён
    </div>
    <div class="ov-msg" id="ovMsg">Сопоставляем ваши ответы с 60 архетипами...</div>
    <div class="ov-dots" id="ovDots">
      <div class="ov-dot"></div><div class="ov-dot"></div><div class="ov-dot"></div>
    </div>
  </div>
</div>

<!-- СТРАНИЦА -->
<div class="page" id="page">

  <div class="hdr">
    <div class="m-logo">MARU</div>
  </div>

  <div class="scroll">

    <!-- HERO -->
    <div class="hero" id="hero">
      <div class="hero-ring-wrap" style="perspective:600px">
        <div class="hero-gyro" id="heroGyro" style="position:relative;width:96px;height:96px;transition:transform .15s ease-out;will-change:transform">
        <svg class="hero-ring-svg" viewBox="0 0 96 96" width="96" height="96" fill="none">
          <defs>
            <linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(74,158,255,0.6)"/>
              <stop offset="100%" stop-color="rgba(74,158,255,0)"/>
            </linearGradient>
          </defs>
          <circle cx="48" cy="48" r="44" stroke="url(#rg)" stroke-width="1"/>
          <circle cx="48" cy="4"  r="2"   fill="rgba(74,158,255,0.8)"/>
          <circle cx="89" cy="34" r="1.5" fill="rgba(74,158,255,0.5)"/>
          <circle cx="75" cy="86" r="1.2" fill="rgba(74,158,255,0.3)"/>
          <circle cx="21" cy="86" r="1.2" fill="rgba(74,158,255,0.2)"/>
          <circle cx="7"  cy="34" r="1"   fill="rgba(74,158,255,0.12)"/>
        </svg>
        <div class="hero-ring-inner" id="heroAv"></div>
        </div>
      </div>
      <div class="hero-name" id="heroName"></div>
      <div class="hero-arch" id="heroArch"></div>
      <div class="hero-rarity" id="heroRarity">один из 60 архетипов</div>
    </div>

    <div class="card" id="c0">
      <div class="ins-wrap">
        <div class="ins-label">природная доминанта</div>
        <div class="ins-row">
          <div class="ins-ico" id="insIco"></div>
          <div class="ins-body">
            <div class="ins-title" id="insTitle"></div>
            <div class="ins-sub" id="insSub">ведущая энергия</div>
          </div>
        </div>
        <div class="ins-text" id="insText">
          <div class="ins-text-inner" id="insTextInner"></div>
          <div class="ins-fade" id="insFade"></div>
          <div class="ins-more" id="insMore" onclick="toggleInsText()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- ЭНЕРГИИ -->
    <div style="margin:24px 0 16px;text-align:center">
      <span style="font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--t3)">Природный профиль</span>
      <span style="font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);margin-left:8px">5 энергий</span>
    </div>
    <div class="card" id="c1">
      <div class="ef-wrap">
        <div class="ef-cols" id="efCols"></div>
        <!-- HINT — строго снизу столбцов -->
        <div class="ef-hint" id="efHint">нажми на любую</div>
      </div>
      <!-- inline desc — снизу карточки -->
      <div class="ef-desc" id="efDesc">

/* анимация баров 9 сек */
function animBars(){
  var st=null,done=false,T=7000,R=1400;
  function fr(ts){
    if(!st)st=ts;var el=ts-st;
    if(el>=T&&!done){
      done=true;
      fills.forEach(function(f,i){
        setTimeout(function(){
          var fe=document.getElementById(f.id);if(!fe)return;
          fe.style.transition='height .65s cubic-bezier(.22,1,.36,1)';
          fe.style.height=f.pct+'%';
          hap('l');
        },i*120);
      });
      return;
    }
    if(done)return;
    var ph=el/T,rp=Math.min(el/R,1),re=1-Math.pow(1-rp,3);
    fills.forEach(function(f,i){
      var fe=document.getElementById(f.id);if(!fe)return;
      var w=Math.sin(el*(0.004+i*0.0009)+i*1.3)*9*(1-ph*0.82)*(rp>.5?1:rp/.5);
      fe.style.transition='none';
      fe.style.height=Math.max(2,Math.min(100,re*f.pct+w))+'%';
    });
    requestAnimationFrame(fr);
  }
  requestAnimationFrame(fr);
}

/* гироскоп hero ring */
(function(){
  var el=document.getElementById('heroGyro');
  if(!el)return;
  var mx=12,hasGyro=false;
  function tilt(x,y){el.style.transform='rotateY('+x+'deg) rotateX('+y+'deg)';}
  function startGyro(){
    var base=null;
    window.addEventListener('deviceorientation',function(e){
      if(e.gamma===null)return;
      hasGyro=true;
      if(!base)base={g:e.gamma,b:e.beta};
      var dx=Math.max(-mx,Math.min(mx,(e.gamma-base.g)*0.6));
      var dy=Math.max(-mx,Math.min(mx,(e.beta-base.b)*-0.6));
      tilt(dx,dy);
    });
  }
  if(window.DeviceOrientationEvent){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      /* iOS 13+ требует разрешения */
      document.addEventListener('touchstart',function reqPerm(){
        DeviceOrientationEvent.requestPermission().then(function(s){
          if(s==='granted')startGyro();
        }).catch(function(){});
        document.removeEventListener('touchstart',reqPerm);
      },{once:true});
    } else {
      startGyro();
    }
  }
  document.addEventListener('mousemove',function(e){
    hasGyro=true;
    var cx=window.innerWidth/2,cy=window.innerHeight/2;
    tilt(((e.clientX-cx)/cx)*mx,((e.clientY-cy)/cy)*-mx);
  });
  /* fallback: мягкое покачивание если нет ни гироскопа ни мыши */
  setTimeout(function(){
    if(hasGyro)return;
    var t=0;
    (function sway(){
      t+=0.02;
      tilt(Math.sin(t)*4,Math.cos(t*0.7)*3);
      requestAnimationFrame(sway);
    })();
  },2000);
})();
