<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html, body {
  height: 100%; background: var(--bg); overflow: hidden;
  -webkit-font-smoothing: antialiased;
  user-select: none; -webkit-user-select: none;
  font-family: 'Inter', -apple-system, sans-serif;
}

/* ═══ INTRO ═══ */
.intro {
  position: fixed; inset: 0; z-index: 50;
  max-width: 390px; margin: 0 auto;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 0 40px;
  transition: opacity .6s ease, transform .6s ease;
}
.intro.fade { opacity: 0; transform: scale(0.97); pointer-events: none }
.intro-text {
  font-size: 20px; font-weight: 500;
  color: var(--t2); text-align: center;
  line-height: 1.5; letter-spacing: -0.02em;
  opacity: 0; transform: translateY(12px);
  animation: introIn .8s .3s ease forwards;
}
@keyframes introIn { to { opacity: 1; transform: none } }

/* ═══ VIEWS ═══ */
.view {
  position: fixed; inset: 0;
  max-width: 390px; margin: 0 auto;
  display: flex; flex-direction: column;
  transition: opacity .4s, transform .4s;
}
.view.hidden { opacity: 0; pointer-events: none; transform: translateX(30px) }

/* ═══ HEADER — как screen3 ═══ */
.hdr {
  flex-shrink: 0;
  display: flex; align-items: center;
  padding: calc(env(safe-area-inset-top, 0px) + 20px) 24px 0;
  gap: 12px;
}

/* ring — точная копия screen3 */
.ring-wrap {
  position: relative;
  width: 44px; height: 44px;
  flex-shrink: 0;
}
.ring-wrap svg { transform: rotate(-90deg); display: block }
.ring-track { fill: none; stroke: rgba(0,0,0,0.1); stroke-width: 3 }
.ring-fill {
  fill: none; stroke: var(--acc);
  stroke-width: 3; stroke-linecap: round;
  transition: stroke-dashoffset 0.4s ease;
}
.ring-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: var(--acc);
}

.hdr-center {
  flex: 1; text-align: center;
}
.m-logo {
  font-size: 24px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--bg);
  text-shadow: -1px -1px 1px rgba(0,0,0,0.2),
               1px 1px 1px rgba(255,255,255,0.75),
               0 0 3px rgba(0,0,0,0.04);
}

/* btn-back — 44×44 гравюрный как screen3 */
.btn-back {
  width: 44px; height: 44px;
  border-radius: 10px;
  border-top: 1px solid rgba(0,0,0,0.08);
  border-left: 1px solid rgba(0,0,0,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.55);
  border-right: 1px solid rgba(255,255,255,0.45);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-back:active { transform: scale(0.9); opacity: 0.6 }
.btn-back svg {
  width: 14px; height: 14px;
  stroke: var(--t2); stroke-width: 2;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
}

/* ═══ SUBTITLE ═══ */
.subtitle {
  text-align: center;
  font-size: 10px; letter-spacing: .15em;
  text-transform: uppercase; color: var(--t2);
  padding: 8px 24px 0;
  flex-shrink: 0;
}

/* ═══ SWIPER ═══ */
.swiper-zone {
  flex-shrink: 0;
  overflow: hidden;
  margin-top: 64px;
}
.swiper { width: 100%; overflow: visible }

/* ═══ CARD — без бордеров ═══ */
.swiper-slide {
  width: 210px !important;
  border-radius: 20px;
  background: var(--bg);
  overflow: hidden;
  transition: transform .35s ease, opacity .35s, filter .5s;
  opacity: 0.25; filter: grayscale(1) brightness(1.05);
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
.swiper-slide-active {
  opacity: 1; filter: grayscale(0) sepia(0.15) brightness(1.02);
  transform: scale(1.06);
  box-shadow: 0 6px 24px rgba(0,0,0,0.1);
}
.swiper-slide-prev,
.swiper-slide-next { opacity: 0.45; filter: grayscale(0.85) brightness(1.02) }
.swiper-slide .card-body { opacity: 0; transition: opacity .3s }
.swiper-slide-active .card-body { opacity: 1 }

.swiper-slide.is-his {
  box-shadow: 0 0 0 2px rgba(255,77,79,0.25), 0 6px 24px rgba(0,0,0,0.08);
}
.his-badge {
  position: absolute; top: 10px; left: 10px; z-index: 5;
  background: var(--acc); color: #fff;
  font-size: 8px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 6px;
  display: none;
}
.swiper-slide.is-his .his-badge { display: block }

.card-img {
  width: 100%; height: 0;
  padding-bottom: 120%;
  position: relative;
  background: linear-gradient(160deg, #e0e0de 0%, #d2d2d0 100%);
  overflow: hidden;
}
.card-img img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: opacity .5s;
}
.card-img img.loading { opacity: 0 }
.card-img::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 55%;
  background: linear-gradient(to bottom, transparent 0%, var(--bg) 100%);
  pointer-events: none;
}

.card-body {
  padding: 0 14px 14px;
  margin-top: -22px;
  position: relative; z-index: 2;
}
.card-name {
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.02em; color: var(--t1);
  line-height: 1.2; text-align: center;
  margin-bottom: 4px;
}
.card-hook {
  font-size: 10.5px; font-weight: 400;
  color: var(--t2); line-height: 1.5;
  text-align: center; min-height: 32px;
}

/* ═══ SPACER ═══ */
.spacer { flex: 1 }

/* ═══ WHISPER — под карточкой ═══ */
.whisper {
  text-align: center;
  font-size: 12px; font-style: italic;
  color: var(--t2); letter-spacing: .01em;
  padding: 24px 40px 0;
  min-height: 18px;
  flex-shrink: 0;
  opacity: 0; transform: translateY(6px);
  transition: opacity .45s .2s ease, transform .45s .2s ease;
}
.whisper.show { opacity: 1; transform: none }

/* ═══ FOOTER ═══ */
.footer {
  flex-shrink: 0;
  padding: 0 24px calc(env(safe-area-inset-bottom, 0px) + 14px);
}
.cta-btn {
  width: 100%; height: 52px;
  background: var(--acc); border: none; border-radius: 16px;
  border-top: 1px solid rgba(255,255,255,0.25);
  border-left: 1px solid rgba(255,255,255,0.15);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  border-right: 1px solid rgba(0,0,0,0.06);
  font-family: inherit; font-size: 11px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase; color: #fff;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: transform .12s;
}
.cta-btn:active { transform: scale(0.97) }
.cta-btn:disabled { opacity: 0.3; pointer-events: none }
.cta-btn.typing-state {
  background: rgba(0,0,0,0.06); color: var(--t2);
  border: none; font-style: italic;
  letter-spacing: .06em; font-weight: 500;
  pointer-events: none;
}
.cta-btn.typing-state .cta-dot {
  display: inline-block; animation: ctaPulse 1s ease infinite;
}
@keyframes ctaPulse {
  0%, 100% { opacity: .3 } 50% { opacity: 1 }
}

/* quick fact */
.quick-fact {
  text-align: center;
  padding: 0 40px;
  flex-shrink: 0;
  opacity: 0; transform: translateY(4px);
  transition: opacity .3s, transform .3s;
}
.quick-fact.show { opacity: 1; transform: none }
.quick-fact span {
  display: inline-block;
  background: rgba(44,44,44,0.9); color: #fff;
  font-size: 11px; line-height: 1.5;
  padding: 8px 16px; border-radius: 10px;
}

/* ═══════ CHAT ═══════ */
.chat-hdr {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
  padding: calc(env(safe-area-inset-top, 0px) + 20px) 20px 12px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.chat-back {
  width: 44px; height: 44px;
  border-radius: 10px;
  border-top: 1px solid rgba(0,0,0,0.08);
  border-left: 1px solid rgba(0,0,0,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.55);
  border-right: 1px solid rgba(255,255,255,0.45);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}
.chat-back:active { transform: scale(0.9); opacity: 0.6 }
.chat-back svg {
  width: 14px; height: 14px;
  stroke: var(--t2); stroke-width: 2;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
}
.chat-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  object-fit: cover; background: #ddd;
  border: 1px solid rgba(0,0,0,0.06);
}
.chat-info { flex: 1 }
.chat-title { font-size: 14px; font-weight: 600; color: var(--t1) }
.chat-sub { font-size: 9px; color: var(--t3); letter-spacing: .06em; text-transform: uppercase }

.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 8px;
  -webkit-overflow-scrolling: touch;
}
.chat-messages::-webkit-scrollbar { display: none }

.msg {
  max-width: 82%; padding: 10px 14px;
  font-size: 13px; line-height: 1.55;
  border-radius: 16px;
  animation: msgIn .25s ease both;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(5px) }
  to   { opacity: 1; transform: none }
}
.msg.bot {
  align-self: flex-start;
  background: rgba(0,0,0,0.04); color: var(--t1);
  border-bottom-left-radius: 4px;
}
.msg.user {
  align-self: flex-end;
  background: var(--acc); color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.typing { padding: 10px 18px }
.msg.typing .dots { display: flex; gap: 4px; align-items: center; height: 18px }
.msg.typing .dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--t3); animation: blink 1.2s ease infinite;
}
.msg.typing .dots span:nth-child(2) { animation-delay: .2s }
.msg.typing .dots span:nth-child(3) { animation-delay: .4s }
@keyframes blink {
  0%, 100% { opacity: .25; transform: scale(1) }
  50%      { opacity: .8;  transform: scale(1.4) }
}

/* prompt chips */
.chat-prompts {
  flex-shrink: 0;
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 8px 16px 4px;
}
.chat-prompts.hidden { display: none }
.prompt-chip {
  padding: 6px 12px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  background: rgba(255,255,255,0.5);
  font-family: inherit; font-size: 11px;
  color: var(--t2); cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.prompt-chip:active { background: var(--acc); color: #fff; border-color: var(--acc) }

/* night mode */
.night .chat-messages { background: rgba(0,0,0,0.02) }
.night .msg.bot { background: rgba(0,0,0,0.06) }
.night .chat-sub::after { content: ' · ночь'; font-style: italic }

.chat-input-wrap {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px calc(env(safe-area-inset-bottom, 0px) + 12px);
  border-top: 1px solid rgba(0,0,0,0.06);
}
.chat-input {
  flex: 1; height: 42px; padding: 0 16px;
  border: 1px solid rgba(0,0,0,0.08); border-radius: 21px;
  background: rgba(255,255,255,0.5);
  font-family: inherit; font-size: 13px; color: var(--t1);
  outline: none; transition: border-color .2s;
}
.chat-input::placeholder { color: var(--t3) }
.chat-input:focus { border-color: rgba(0,0,0,0.18) }
.chat-send {
  width: 42px; height: 42px; flex-shrink: 0;
  border: none; border-radius: 50%;
  background: var(--acc); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .12s, opacity .2s;
}
.chat-send:active { transform: scale(0.92) }
.chat-send:disabled { opacity: 0.25; pointer-events: none }
.chat-send svg { width: 18px; height: 18px }

/* ═══ PAYWALL ═══ */
.pw {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(239,239,238,0.97);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px; text-align: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.pw.show { opacity: 1; pointer-events: auto }
.pw-icon { font-size: 36px; margin-bottom: 16px }
.pw-title { font-size: 18px; font-weight: 700; color: var(--t1); margin-bottom: 8px }
.pw-desc { font-size: 13px; color: var(--t2); line-height: 1.6; margin-bottom: 24px; max-width: 280px }
.pw-btn {
  width: 100%; max-width: 280px; height: 48px;
  background: var(--acc); border: none; border-radius: 14px;
  font-family: inherit; font-size: 12px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: #fff;
  cursor: pointer; margin-bottom: 12px;
}
.pw-btn:active { transform: scale(0.97) }
.pw-close {
  font-size: 11px; color: var(--t3);
  background: none; border: none;
  cursor: pointer; text-decoration: underline;
}
</style>
</head>

/* ═══ State ═══ */
var archetypes = {};
var archKeys = [];
var currentArch = null;
var myArchKey = '';
var swiper = null;

/* ═══ Intro ═══ */
try {
  var introData = JSON.parse(localStorage.getItem('maru_block1') || '{}');
  if (introData.archetype) {
    document.querySelector('.intro-text').innerHTML =
      'Он — ' + introData.archetype + '.<br>Теперь можешь спросить — почему.';
  }
} catch(e) {}
setTimeout(function() {
  document.getElementById('intro').classList.add('fade');
  setTimeout(function() { document.getElementById('intro').style.display = 'none'; }, 600);

/* ═══ Load ═══ */
function loadArchetypes() {
  fetch(CDN)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      archetypes = data.archetypes || {};
      archKeys = Object.keys(archetypes).slice(0, 30);
      myArchKey = getMyArchKey();
      buildCards();
      initSwiper();
      initSwipeHaptic();
    })
    .catch(function(e) {
      console.error('Load error:', e);
      document.getElementById('swiperWrapper').innerHTML =
        '<div style="padding:40px;text-align:center;color:var(--t2);font-size:13px">Не удалось загрузить</div>';
    });
}

function getMyArchKey() {
  try {
    var d = JSON.parse(localStorage.getItem('maru_archetype_data') || '{}');
    return d.key || d.id || '';
  } catch(e) { return ''; }
}

/* ═══ Cards ═══ */
function buildCards() {
  var html = '';
  for (var i = 0; i < archKeys.length; i++) {
    var key = archKeys[i];
    var a = archetypes[key];
    var hook = HOOKS[key] || firstSentence(a.first_para);
    var isHis = key === myArchKey;
    html +=
      '<div class="swiper-slide' + (isHis ? ' is-his' : '') + '" data-key="' + key + '">' +
        '<div class="his-badge">его тип</div>' +
        '<div class="card-img">' +
          '<img src="' + PHOTO_BASE + key + '.jpg" class="loading" alt="' + a.name + '"' +
          ' onload="this.classList.remove(\'loading\')" onerror="this.classList.remove(\'loading\');this.style.opacity=\'0\'">' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-name">' + a.name + '</div>' +
          '<div class="card-hook">' + hook + '</div>' +
        '</div>' +
      '</div>';
  }
  document.getElementById('swiperWrapper').innerHTML = html;
}

function firstSentence(text) {
  if (!text) return '';
  var m = text.match(/^[^.!?]+[.!?]/);
  var s = m ? m[0].trim() : text.slice(0, 70);
  return s.length > 65 ? s.slice(0, 65) + '…' : s;
}

/* ═══ Swiper ═══ */
function initSwiper() {
  var startIdx = myArchKey ? archKeys.indexOf(myArchKey) : 0;
  if (startIdx < 0) startIdx = 0;

  swiper = new Swiper('#archSwiper', {
    effect: 'coverflow',
    grabCursor: true,
    centeredSlides: true,
    slidesPerView: 'auto',
    coverflowEffect: { rotate: 0, stretch: 60, depth: 100, modifier: 1.2, slideShadows: false },
    initialSlide: startIdx,
    loop: archKeys.length > 3,
    on: {
      slideChange: function() { updateActive(this); },
      afterInit: function() { updateActive(this); }
    }
  });
}

function updateActive(sw) {
  var slide = sw.slides[sw.activeIndex];
  if (!slide) return;
  var key = slide.getAttribute('data-key');
  if (key && archetypes[key]) {
    currentArch = { key: key, name: archetypes[key].name, data: archetypes[key] };
    document.getElementById('talkBtn').disabled = false;
  }

  /* ring progress */
  var real = sw.realIndex || 0;
  var total = archKeys.length;
  var pct = (real + 1) / total;
  var offset = CIRC - (pct * CIRC);
  document.getElementById('ringFill').setAttribute('stroke-dashoffset', offset);
  document.getElementById('ringNum').textContent = (real + 1);

  /* whisper */
  var whisperEl = document.getElementById('whisper');
  whisperEl.classList.remove('show');
  document.getElementById('quickFact').classList.remove('show');
  setTimeout(function() {
    whisperEl.textContent = WHISPERS[key] || '';
    whisperEl.classList.add('show');
  }, 150);
}

/* ═══ Chat ═══ */
function openChat() {
  if (!currentArch) return;
  document.getElementById('chatName').textContent = currentArch.name;
  document.getElementById('chatAvatar').src = PHOTO_BASE + currentArch.key + '.jpg';
  document.getElementById('chatMessages').innerHTML = '';

  document.getElementById('carouselView').classList.add('hidden');
  document.getElementById('chatView').classList.remove('hidden');

  /* ночной режим */
  if (isNight) document.getElementById('chatView').classList.add('night');
  else document.getElementById('chatView').classList.remove('night');

  if (!msgCount[currentArch.key]) msgCount[currentArch.key] = 0;

  /* чипы-подсказки */
  buildPromptChips();

  var delay = currentArch.key === 'khranitel' ? 2500 : 600;
  setTimeout(function() {
    showTyping(function() {
      var greeting = GREETINGS[currentArch.key] || DEFAULT_GREETING;
      if (isNight) greeting = pick(NIGHT_REPLIES);
      addMsg(greeting, 'bot');
    }, currentArch.key === 'khranitel' ? 2000 : undefined);
  }, delay);

  document.getElementById('chatInput').focus();
  haptic('light');
}

function buildPromptChips() {
  var wrap = document.getElementById('chatPrompts');
  var chips = PROMPT_CHIPS[currentArch.key] || DEFAULT_CHIPS;
  wrap.innerHTML = '';
  wrap.classList.remove('hidden');
  chips.forEach(function(text) {
    var chip = document.createElement('button');
    chip.className = 'prompt-chip';
    chip.textContent = text;
    chip.onclick = function() {
      document.getElementById('chatInput').value = text;
      document.getElementById('chatSend').disabled = false;
      sendMessage();
      wrap.classList.add('hidden');
    };
    wrap.appendChild(chip);
  });
}

function closeChat() {
  document.getElementById('chatView').classList.add('hidden');
  document.getElementById('carouselView').classList.remove('hidden');
  haptic('light');
}

function addMsg(text, type) {
  removeTyping();
  var el = document.createElement('div');
  el.className = 'msg ' + type;
  el.textContent = text;
  var box = document.getElementById('chatMessages');
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function showTyping(cb, duration) {
  var el = document.createElement('div');
  el.className = 'msg bot typing';
  el.id = 'typingMsg';
  el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  var box = document.getElementById('chatMessages');
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  setTimeout(function() { if (cb) cb(); }, duration || (700 + Math.random() * 500));
}

function removeTyping() {
  var t = document.getElementById('typingMsg');
  if (t) t.remove();
}

/* ═══ Send ═══ */
function sendMessage() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text || !currentArch) return;

  input.value = '';
  document.getElementById('chatSend').disabled = true;
  document.getElementById('chatPrompts').classList.add('hidden');
  addMsg(text, 'user');

  msgCount[currentArch.key] = (msgCount[currentArch.key] || 0) + 1;

  if (msgCount[currentArch.key] > 3) {
    setTimeout(showPaywall, 400);
    return;
  }

  showTyping(function() { addMsg(generateReply(text), 'bot'); });
  haptic('soft');
}

/* ═══ Reply stub ═══ */
function generateReply(text) {
  var q = text.toLowerCase();
  if (/молчи/.test(q))
    return pick(['Молчание — не пустота. Это пространство, где я думаю.',
                 'Я не молчу. Я выбираю слова.',
                 'А ты уверена, что готова услышать?']);
  if (/люб/.test(q))
    return pick(['Любовь — не слова. Это то, что я делаю, пока ты не видишь.',
                 'Я не говорю об этом. Если присмотришься — заметишь.',
                 'Определи «любовь» — и я скажу, попадаю ли.']);
  if (/вернёшь|вернеш|уходи/.test(q))
    return pick(['Я не ухожу. Отступаю, чтобы видеть картину целиком.',
                 'Вернусь ли? Зависит от того, есть ли куда.',
                 'Я возвращаюсь. Но не тогда, когда ждёшь.']);
  if (/чувств|эмоц/.test(q))
    return pick(['Мои чувства — не то, что показываю. Это то, что контролирую.',
                 'Хочешь знать, что чувствую? Ты готова?',
                 'Эмоции — данные. Я их обрабатываю.']);
  if (/кто ты|расскаж/.test(q))
    return 'Я — ' + currentArch.name + '. Модель того, как он думает. Не он — но его логика.';
  if (/почему|зачем/.test(q))
    return pick(['Потому что так устроен. Не хуже и не лучше — иначе.',
                 'Ты хочешь причину? Или оправдание?',
                 'Это не выбор. Это механика.']);
  if (/боишь|страх|слаб/.test(q))
    return pick(['Страх? Возможно. Но я называю это осторожностью.',
                 'Слабость — когда знаешь, но не делаешь. Я — делаю.',
                 'Бояться — нормально. Показывать — нет. Для меня.']);
  /* ночные ответы — откровеннее */
  if (isNight)
    return pick(['Ночью сложнее врать. Спрашивай ещё.',
                 'Сейчас я бы ответил иначе, чем днём. Но промолчу.',
                 'Ты не спишь. Значит, это важно. Мне тоже.',
                 'Ночью я уязвимее. Пользуйся.',
                 'В три ночи честность — не выбор. Это неизбежность.']);
  return pick(['Интересный вопрос. Но уверена, что хочешь знать?',
               'Слышу тебя. Но отвечу по-своему.',
               'Спрашиваешь — думаю. Не торопи.',
               'Это сложнее, чем кажется.',
               'Ты задаёшь правильные вопросы.']);
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ═══ Paywall ═══ */
function showPaywall() {
  removeTyping();
  document.getElementById('paywall').classList.add('show');
  haptic('warning');
}

/* ═══ Haptic ═══ */
function haptic(type) {
  try {
    if (type === 'warning') Telegram.WebApp.HapticFeedback.notificationOccurred('warning');
    else Telegram.WebApp.HapticFeedback.impactOccurred(type);
  } catch(e) {}
}

/* ═══ 1. Haptic на свайпе ═══ */
function initSwipeHaptic() {
  if (!swiper) return;
  swiper.on('slideChange', function() { haptic('light'); });
}

/* ═══ 3. Дабл-тап → quick fact ═══ */
var factTimer = null;
document.getElementById('archSwiper').addEventListener('dblclick', function(e) {
  if (!currentArch) return;
  var fact = QUICK_FACTS[currentArch.key];

  var el = document.getElementById('quickFact');
  el.innerHTML = '<span>' + fact + '</span>';
  el.classList.add('show');
  haptic('medium');

  clearTimeout(factTimer);
  factTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
});

  btn.classList.add('typing-state');
  btn.innerHTML = 'Он набирает<span class="cta-dot">...</span>';
  haptic('light');

  setTimeout(function() {
    btn.classList.remove('typing-state');
    btn.innerHTML = 'ПОГОВОРИТЬ';
    openChat();
  }, 1200);
}

/* ═══ Events ═══ */
document.getElementById('talkBtn').addEventListener('click', openChatWithDelay);
document.getElementById('chatBack').addEventListener('click', closeChat);
document.getElementById('chatSend').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('input', function() {
  document.getElementById('chatSend').disabled = !this.value.trim();
});
document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('pwClose').addEventListener('click', function() {
  document.getElementById('paywall').classList.remove('show');
  closeChat();
});
document.getElementById('pwBuy').addEventListener('click', function() {
  window.location.href = 'screen8.html';
});

/* ═══ Start ═══ */
loadArchetypes();
</script>
