<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MARU · Stories</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;color:#fff;padding:24px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:14px;color:rgba(255,255,255,0.5);text-align:center}
.btn{margin-top:24px;padding:16px 32px;border-radius:14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:none}
.btn:active{opacity:0.7}
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Загружаю карточку...</div>
<button class="btn" id="btn" onclick="doShare()">Поделиться в Stories</button>

<script>
var params=new URLSearchParams(window.location.search);
var cardUrl=params.get('url')||'';
var archName=params.get('name')||'';
var blob=null;

if(cardUrl){
  fetch(cardUrl).then(function(r){return r.blob();}).then(function(b){
    blob=b;
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Карточка готова';
    /* попробуем автоматически */
    doShare();
  }).catch(function(){
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='Ошибка загрузки';
  });
}

function doShare(){
  if(!blob)return;
  var file=new File([blob],'MARU_'+archName+'.jpg',{type:'image/jpeg'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:'MARU · '+archName}).then(function(){
      document.getElementById('msg').textContent='Отправлено!';
    }).catch(function(e){
      if(e.name!=='AbortError'){
        showButton();
      }
    });
  } else {
    /* fallback — скачать */
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='MARU_'+archName+'.jpg';
    a.click();
    document.getElementById('msg').textContent='Сохранено — откройте Instagram и добавьте в Stories';
  }
}

function showButton(){
  document.getElementById('btn').style.display='block';
  document.getElementById('msg').textContent='Нажмите для отправки';
}
</script>
</body>
</html>
