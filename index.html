<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
:root{
  --bg:#E8919B;
  --sd:#C48080;
  --sl:#F5C0C0;
  --acc:#FF6F61;
}
html,body{width:100%;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:var(--bg);margin:0 auto;max-width:390px;position:relative}

#splash{
  position:absolute;top:0;bottom:0;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  background:var(--bg) url('splash-logo.png?v=2') center/cover no-repeat;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  z-index:100;
  overflow:hidden;
  opacity:0;
  transition:opacity 1s cubic-bezier(0.4,0,0.2,1);
}

/* Подзаголовок */
.spl-sub{
  position:absolute;
  left:0;right:0;
  top:calc(50% + 30px);
  z-index:2;
  font-size:11px;
  font-weight:400;
  letter-spacing:0.12em;
  background:linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0.85), rgba(255,255,255,0.4));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-align:center;
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.8s ease, transform 0.8s ease;
}

/* CTA */
.spl-btn-wrap{
  position:absolute;
  bottom:calc(40px + env(safe-area-inset-bottom));
  left:0;right:0;
  display:flex;
  justify-content:center;
  z-index:2;
  opacity:0;
  transform:translateY(14px);
  transition:opacity 0.9s cubic-bezier(0.22,1,0.36,1),
             transform 0.9s cubic-bezier(0.22,1,0.36,1);
}

.spl-btn{
  background:none;
  border:none;
  font-family:'Inter',sans-serif;
  font-size:11px;
  font-weight:400;
  letter-spacing:0.26em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.75);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  padding:8px 4px;
  position:relative;
}
.spl-btn::after{
  content:'';
  position:absolute;
  bottom:4px;
  left:4px;
  right:4px;
  height:1px;
  background:rgba(255,255,255,0.4);
  transform:scaleX(0);
  transform-origin:left;
  animation:lineIn 1.2s 2.2s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes lineIn{to{transform:scaleX(1)}}

/* две фразы с crossfade */
.btn-text{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  white-space:nowrap;
  transition:opacity 0.6s ease;
}
.btn-text.hidden{opacity:0}
.btn-text.visible{opacity:1}

</style>
</head>
<body>

<div id="splash">

  <!-- Подзаголовок -->
  <div class="spl-sub" id="splSub">30 архетипов мужчин · узнай его тип</div>

  <div class="spl-btn-wrap" id="btnWrap">
    <button class="spl-btn" id="splBtn" style="width:200px;height:32px;">
      <span class="btn-text visible" id="txt1">&gt; узнать, кто он</span>
      <span class="btn-text hidden"  id="txt2">&gt; 30 типов · один его</span>
    </button>
  </div>

</div>

<script>
(function(){
  var tg = null;
  if(window.Telegram && window.Telegram.WebApp){
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    try{tg.setBackgroundColor('#E8919B');tg.setHeaderColor('#E8919B');}catch(e){}
  }

  /* ── РЕДИРЕКТ: если открыто по ссылке с результатом ── */
  if(tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param){
    window.location.replace('screen6.html');
    return;
  }

  var splash  = document.getElementById('splash');
  var btnWrap = document.getElementById('btnWrap');
  var btn     = document.getElementById('splBtn');

  /* ── ПОЯВЛЕНИЕ СПЛЭША ── */
  setTimeout(function(){
    splash.style.opacity = '1';
  }, 100);

  /* ── ПОДЗАГОЛОВОК 1.2s ── */
  setTimeout(function(){
    var sub = document.getElementById('splSub');
    sub.style.opacity = '1';
    sub.style.transform = 'translateY(0)';
  }, 1200);

  /* ── КНОПКА 1.6s ── */
  setTimeout(function(){
    btnWrap.style.opacity   = '1';
    btnWrap.style.transform = 'translateY(0)';
  }, 1600);

  /* ── CROSSFADE ФРАЗ CTA ── */
  (function(){
    var txt1 = document.getElementById('txt1');
    var txt2 = document.getElementById('txt2');
    var showing1 = true;

    function togglePhrase(){
      if(showing1){
        txt1.classList.remove('visible'); txt1.classList.add('hidden');
        setTimeout(function(){
          txt2.classList.remove('hidden'); txt2.classList.add('visible');
        }, 300);
      } else {
        txt2.classList.remove('visible'); txt2.classList.add('hidden');
        setTimeout(function(){
          txt1.classList.remove('hidden'); txt1.classList.add('visible');
        }, 300);
      }
      showing1 = !showing1;
    }

    setTimeout(function(){
      setInterval(togglePhrase, 4000);
    }, 4500);
  })();

  /* ── СВАЙП ВНИЗ ── */
  (function(){
    var startY = 0, pulling = false, pullDist = 0;
    var THRESHOLD = 80;

    splash.addEventListener('touchstart', function(e){
      if(e.target === btn || btn.contains(e.target)) return;
      startY   = e.touches[0].clientY;
      pulling  = true;
      pullDist = 0;
    }, {passive:true});

    splash.addEventListener('touchmove', function(e){
      if(!pulling || exited) return;
      var dy = e.touches[0].clientY - startY;
      if(dy < 0){ pulling = false; return; }
      pullDist = Math.min(dy, THRESHOLD * 1.5);
      var progress = Math.min(pullDist / THRESHOLD, 1);

      splash.style.transition = 'none';
      splash.style.opacity = 1 - progress * 0.6;
      splash.style.transform = 'translateX(-50%) scale('+(1 - progress * 0.05)+')';
    }, {passive:true});

    splash.addEventListener('touchend', function(){
      if(!pulling || exited) return;
      pulling = false;
      var progress = pullDist / THRESHOLD;

      if(progress >= 1){
        goToScreen1(true);
      } else {
        splash.style.transition = 'opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
        splash.style.opacity = '1';
        splash.style.transform = 'translateX(-50%) scale(1)';
      }
    }, {passive:true});
  })();

  /* ── EXIT ── */
  var exited = false;

  function goToScreen1(alreadyPulled){
    if(exited) return;
    exited = true;
    if(tg) tg.HapticFeedback.impactOccurred('medium');
    if(navigator.vibrate) navigator.vibrate(18);

    splash.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    splash.style.opacity = '0';
    splash.style.transform = 'translateX(-50%) scale(0.96)';

    setTimeout(function(){
      splash.style.display = 'none';
      document.body.style.transition='opacity .3s';
      document.body.style.opacity='0';
      setTimeout(function(){ window.location.href='screen1.html'; }, 300);
    }, 350);
  }

  btn.addEventListener('click',    function(e){ e.preventDefault(); goToScreen1(false); });
  btn.addEventListener('touchend', function(e){ e.preventDefault(); goToScreen1(false); }, {passive:false});

})();
</script>

</body>
</html>
