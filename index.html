<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU</title>
<script>
var V="20260404b";
if(localStorage.getItem("maru_v")!==V){localStorage.setItem("maru_v",V);location.reload(true);}
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#d48d93}

#splash{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;height:100%;
  z-index:100;overflow:hidden;
}

#content{position:absolute;inset:0;overflow:hidden;z-index:0}
#content img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center 38%;
}

#subtitle{
  position:absolute;left:0;right:0;top:calc(56% - 32px);z-index:2;
  font-size:11px;font-weight:400;letter-spacing:0.12em;
  color:rgba(255,255,255,0.7);text-align:center;
  opacity:0;transform:translateY(6px);
  transition:opacity 0.8s ease, transform 0.8s ease;
}
#subtitle.show{opacity:1;transform:translateY(0)}

#cta{
  position:absolute;bottom:calc(28px + env(safe-area-inset-bottom));
  left:0;right:0;display:flex;justify-content:center;z-index:2;
  opacity:0;transform:translateY(14px);
  transition:opacity 0.9s cubic-bezier(0.22,1,0.36,1),
             transform 0.9s cubic-bezier(0.22,1,0.36,1);
}
#cta.show{opacity:1;transform:translateY(0)}

#cta button{
  background:none;border:none;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:400;
  letter-spacing:0.26em;text-transform:uppercase;
  color:rgba(255,255,255,0.75);
  cursor:pointer;padding:8px 4px;
  position:relative;width:200px;height:32px;
  animation:ctaPulse 3s ease-in-out infinite;
}
@keyframes ctaPulse{0%,100%{opacity:0.75}50%{opacity:1}}

.t{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;transition:opacity 0.6s ease}
.t.h{opacity:0}.t.v{opacity:1}
</style>
</head>
<body>

<div id="splash">
  <div id="content">
    <img src="splash-logo.png" alt="">
  </div>
  <div id="subtitle">30 архетипов мужчин · узнай его тип</div>
  <div id="cta">
    <button id="btn">
      <span class="t v" id="t1">> хватит гадать</span>
      <span class="t h" id="t2">> узнай, как действовать</span>
    </button>
  </div>
</div>

<script>
(function(){
  var tg=null;
  if(window.Telegram&&window.Telegram.WebApp){
    tg=window.Telegram.WebApp;
    tg.ready();tg.expand();
  }

  if(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.start_param){
    window.location.replace('screen6.html');return;
  }

  var splash=document.getElementById('splash');
  var btn=document.getElementById('btn');
  var sub=document.getElementById('subtitle');
  var cta=document.getElementById('cta');
  var img=splash.querySelector('img');

  function applyColorFromImage(){
    var i=new Image();
    if(location.protocol!=='file:')i.crossOrigin='anonymous';
    i.onload=function(){
      try{
        var c=document.createElement('canvas');
        c.width=i.naturalWidth;c.height=i.naturalHeight;
        var ctx=c.getContext('2d');
        ctx.drawImage(i,0,0);
        var px=ctx.getImageData(Math.floor(c.width/2),5,1,1).data;
        var hex='#'+((1<<24)+(px[0]<<16)+(px[1]<<8)+px[2]).toString(16).slice(1);
        document.body.style.background=hex;
        if(tg){try{tg.setHeaderColor(hex);tg.setBackgroundColor(hex);}catch(e){}}
      }catch(e){}
    };
    i.src='splash-logo.png';
  }

  applyColorFromImage();
  setTimeout(function(){sub.classList.add('show');},800);
  setTimeout(function(){cta.classList.add('show');},800);

  var t1=document.getElementById('t1'),t2=document.getElementById('t2'),s=true;
  function flip(){
    if(s){t1.className='t h';setTimeout(function(){t2.className='t v';},300);}
    else{t2.className='t h';setTimeout(function(){t1.className='t v';},300);}
    s=!s;
  }
  setTimeout(function(){setInterval(flip,4000);},4500);

  var sy=0,pull=false,pd=0,TH=80;
  splash.addEventListener('touchstart',function(e){
    if(e.target===btn||btn.contains(e.target))return;
    sy=e.touches[0].clientY;pull=true;pd=0;
  },{passive:true});
  splash.addEventListener('touchmove',function(e){
    if(!pull||done)return;
    var dy=e.touches[0].clientY-sy;
    if(dy<0){pull=false;return;}
    pd=Math.min(dy,TH*1.5);
    var p=Math.min(pd/TH,1);
    splash.style.transition='none';
    splash.style.opacity=1-p*0.6;
    splash.style.transform='translateX(-50%) scale('+(1-p*0.05)+')';
  },{passive:true});
  splash.addEventListener('touchend',function(){
    if(!pull||done)return;pull=false;
    if(pd/TH>=1)go();
    else{splash.style.transition='opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1)';splash.style.opacity='1';splash.style.transform='translateX(-50%) scale(1)';}
  },{passive:true});

  var done=false;
  function go(){
    if(done)return;done=true;
    if(tg){tg.HapticFeedback.impactOccurred('medium');try{tg.setBackgroundColor('#efefee');tg.setHeaderColor('#efefee');}catch(e){}}
    if(navigator.vibrate)navigator.vibrate(18);
    splash.style.transition='opacity .35s ease';
    splash.style.opacity='0';
    setTimeout(function(){splash.style.display='none';window.location.href='screen1.html';},400);
  }

  btn.addEventListener('click',function(e){e.preventDefault();go();});
  btn.addEventListener('touchend',function(e){e.preventDefault();go();},{passive:false});
})();
</script>

</body>
</html>
