<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#dd9ca2}

/* ===== Splash — полный экран ===== */
#splash{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  z-index:100;overflow:hidden;
}

/* Фоновая картинка — на весь экран */
#splash img{
  position:absolute;top:0;left:0;
  width:100%;height:calc(100% + 60px);
  object-fit:contain;
  object-position:center top;
  z-index:0;
}

/* Подпись — под лого. Лого в картинке на 50% высоты.
   object-position:center 45% чуть сдвигает вверх.
   Подпись ставим на 55% экрана — гарантированно ниже лого */
#subtitle{
  position:absolute;
  left:0;right:0;
  bottom:calc(50% - 80px);
  z-index:2;
  font-family:'Inter',sans-serif;
  font-size:11px;
  font-weight:400;
  letter-spacing:0.12em;
  color:rgba(255,255,255,0.7);
  text-align:center;
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.8s ease, transform 0.8s ease;
}
#subtitle.show{opacity:1;transform:translateY(0)}

/* CTA кнопка внизу */
#cta{
  position:absolute;
  bottom:calc(28px + env(safe-area-inset-bottom));
  left:0;right:0;
  display:flex;justify-content:center;
  z-index:2;
  opacity:0;
  transform:translateY(14px);
  transition:opacity 0.9s cubic-bezier(0.22,1,0.36,1),
             transform 0.9s cubic-bezier(0.22,1,0.36,1);
}
#cta.show{opacity:1;transform:translateY(0)}

#cta button{
  background:none;border:none;
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:400;
  letter-spacing:0.26em;text-transform:uppercase;
  color:rgba(255,255,255,0.75);
  cursor:pointer;padding:8px 4px;
  position:relative;width:200px;height:32px;
}
#cta button::after{
  content:'';position:absolute;
  bottom:4px;left:4px;right:4px;height:1px;
  background:rgba(255,255,255,0.4);
  transform:scaleX(0);transform-origin:left;
  animation:lineIn 1.2s 2.2s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes lineIn{to{transform:scaleX(1)}}

.t{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;transition:opacity 0.6s ease}
.t.h{opacity:0}.t.v{opacity:1}
</style>
</head>
<body>

<div id="splash">
  <img src="photos/Gemini_Generated_Image_dmhkyzdmhkyzdmhk.png" alt="">
  <div id="subtitle">30 архетипов мужчин · узнай его тип</div>
  <div id="cta">
    <button id="btn">
      <span class="t v" id="t1">> узнать, кто он</span>
      <span class="t h" id="t2">> 30 типов · один его</span>
    </button>
  </div>
</div>

<script>
(function(){
  var tg=null;
  if(window.Telegram&&window.Telegram.WebApp){
    tg=window.Telegram.WebApp;
    tg.ready();tg.expand();
    try{tg.setBackgroundColor('#dd9ca2');tg.setHeaderColor('#dd9ca2');}catch(e){}
  }

  /* Deep link → screen6 */
  if(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.start_param){
    window.location.replace('screen6.html');return;
  }

  var splash=document.getElementById('splash');
  var btn=document.getElementById('btn');
  var sub=document.getElementById('subtitle');
  var cta=document.getElementById('cta');
  var img=splash.querySelector('img');

  /* Ждём загрузку картинки, потом анимируем */
  function init(){
    setTimeout(function(){sub.classList.add('show');},800);
    setTimeout(function(){cta.classList.add('show');},800);
  }
  if(img.complete)init();else{img.onload=init;img.onerror=init;}

  /* Crossfade фраз */
  var t1=document.getElementById('t1'),t2=document.getElementById('t2'),s=true;
  function flip(){
    if(s){t1.className='t h';setTimeout(function(){t2.className='t v';},300);}
    else{t2.className='t h';setTimeout(function(){t1.className='t v';},300);}
    s=!s;
  }
  setTimeout(function(){setInterval(flip,4000);},4500);

  /* Свайп вниз → screen1 */
  var sy=0,pull=false,pd=0,TH=80;
  splash.addEventListener('touchstart',function(e){
    if(e.target===btn||btn.contains(e.target))return;
    sy=e.touches[0].clientY;pull=true;pd=0;
  },{passive:true});
  splash.addEventListener('touchmove',function(e){
    if(!pull||done)return;
    var dy=e.touches[0].clientY-sy;
    if(dy<0){pull=false;return;}
    pd=Math.min(dy,TH*1.5);
    var p=Math.min(pd/TH,1);
    splash.style.transition='none';
    splash.style.opacity=1-p*0.6;
    splash.style.transform='scale('+(1-p*0.05)+')';
  },{passive:true});
  splash.addEventListener('touchend',function(){
    if(!pull||done)return;pull=false;
    if(pd/TH>=1)go();
    else{splash.style.transition='opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1)';splash.style.opacity='1';splash.style.transform='scale(1)';}
  },{passive:true});

  /* Переход */
  var done=false;
  function go(){
    if(done)return;done=true;
    if(tg){tg.HapticFeedback.impactOccurred('medium');try{tg.setBackgroundColor('#efefee');tg.setHeaderColor('#efefee');}catch(e){}}
    if(navigator.vibrate)navigator.vibrate(18);
    splash.style.transition='opacity .35s ease';
    splash.style.opacity='0';
    setTimeout(function(){splash.style.display='none';window.location.href='screen1.html';},400);
  }

  btn.addEventListener('click',function(e){e.preventDefault();go();});
  btn.addEventListener('touchend',function(e){e.preventDefault();go();},{passive:false});
})();
</script>

</body>
</html>
