<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MARU</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preload" href="splash-logo.png" as="image">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#D4959E;margin:0 auto;max-width:390px;position:relative}

#splash{
  position:absolute;inset:0;
  margin:0 auto;max-width:390px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:100;overflow:hidden;
}

/* Фон-картинка — отдельный слой, обрезаем низ чтобы скрыть звёздочку Gemini */
#splash-bg{
  position:absolute;inset:0;
  background:url('splash-logo.png') center 40%/cover no-repeat;
  z-index:0;
}
/* Перекрытие звёздочки Gemini внизу */
#splash-bg::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:60px;
  background:#D4959E;
}

/* Подзаголовок — ПОД лого */
.spl-sub{
  position:absolute;
  left:0;right:0;
  top:calc(40% + 45px);
  z-index:2;
  font-family:'Inter',sans-serif;
  font-size:11px;
  font-weight:400;
  letter-spacing:0.12em;
  color:rgba(255,255,255,0.7);
  text-align:center;
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.8s ease, transform 0.8s ease;
}

/* CTA внизу */
.spl-btn-wrap{
  position:absolute;
  bottom:calc(28px + env(safe-area-inset-bottom));
  left:0;right:0;
  display:flex;justify-content:center;
  z-index:2;
  opacity:0;
  transform:translateY(14px);
  transition:opacity 0.9s cubic-bezier(0.22,1,0.36,1),
             transform 0.9s cubic-bezier(0.22,1,0.36,1);
}
.spl-btn{
  background:none;border:none;
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:400;
  letter-spacing:0.26em;text-transform:uppercase;
  color:rgba(255,255,255,0.75);
  cursor:pointer;padding:8px 4px;position:relative;
}
.spl-btn::after{
  content:'';position:absolute;
  bottom:4px;left:4px;right:4px;height:1px;
  background:rgba(255,255,255,0.4);
  transform:scaleX(0);transform-origin:left;
  animation:lineIn 1.2s 2.2s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes lineIn{to{transform:scaleX(1)}}

.btn-text{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  white-space:nowrap;transition:opacity 0.6s ease;
}
.btn-text.hidden{opacity:0}
.btn-text.visible{opacity:1}
</style>
</head>
<body>

<div id="splash">
  <div id="splash-bg"></div>

  <div class="spl-sub" id="splSub">30 архетипов мужчин · узнай его тип</div>

  <div class="spl-btn-wrap" id="btnWrap">
    <button class="spl-btn" id="splBtn" style="width:200px;height:32px;">
      <span class="btn-text visible" id="txt1">&gt; узнать, кто он</span>
      <span class="btn-text hidden"  id="txt2">&gt; 30 типов · один его</span>
    </button>
  </div>
</div>

<script>
(function(){
  var tg = null;
  if(window.Telegram && window.Telegram.WebApp){
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    try{tg.setBackgroundColor('#D4959E');tg.setHeaderColor('#D4959E');}catch(e){}
  }

  if(tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param){
    window.location.replace('screen6.html');
    return;
  }

  var splash  = document.getElementById('splash');
  var splashBg = document.getElementById('splash-bg');
  var btnWrap = document.getElementById('btnWrap');
  var btn     = document.getElementById('splBtn');

  /* Показать сплэш после загрузки картинки */
  var bgImg = new Image();
  bgImg.onload = show;
  bgImg.onerror = show;
  bgImg.src = 'splash-logo.png';

  function show(){
    /* Подзаголовок */
    setTimeout(function(){
      var sub = document.getElementById('splSub');
      sub.style.opacity = '1';
      sub.style.transform = 'translateY(0)';
    }, 800);

    /* Кнопка */
    setTimeout(function(){
      btnWrap.style.opacity = '1';
      btnWrap.style.transform = 'translateY(0)';
    }, 1400);
  }

  /* Crossfade фраз */
  (function(){
    var txt1 = document.getElementById('txt1');
    var txt2 = document.getElementById('txt2');
    var showing1 = true;
    function toggle(){
      if(showing1){
        txt1.classList.remove('visible');txt1.classList.add('hidden');
        setTimeout(function(){txt2.classList.remove('hidden');txt2.classList.add('visible');},300);
      } else {
        txt2.classList.remove('visible');txt2.classList.add('hidden');
        setTimeout(function(){txt1.classList.remove('hidden');txt1.classList.add('visible');},300);
      }
      showing1=!showing1;
    }
    setTimeout(function(){setInterval(toggle,4000);},4500);
  })();

  /* Свайп вниз */
  (function(){
    var startY=0,pulling=false,pullDist=0,THRESHOLD=80;
    splash.addEventListener('touchstart',function(e){
      if(e.target===btn||btn.contains(e.target))return;
      startY=e.touches[0].clientY;pulling=true;pullDist=0;
    },{passive:true});
    splash.addEventListener('touchmove',function(e){
      if(!pulling||exited)return;
      var dy=e.touches[0].clientY-startY;
      if(dy<0){pulling=false;return;}
      pullDist=Math.min(dy,THRESHOLD*1.5);
      var p=Math.min(pullDist/THRESHOLD,1);
      splash.style.transition='none';
      splash.style.opacity=1-p*0.6;
      splash.style.transform='scale('+(1-p*0.05)+')';
    },{passive:true});
    splash.addEventListener('touchend',function(){
      if(!pulling||exited)return;
      pulling=false;
      if(pullDist/THRESHOLD>=1){goToScreen1();}
      else{
        splash.style.transition='opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1)';
        splash.style.opacity='1';splash.style.transform='scale(1)';
      }
    },{passive:true});
  })();

  /* Exit */
  var exited=false;
  function goToScreen1(){
    if(exited)return;exited=true;
    if(tg){
      tg.HapticFeedback.impactOccurred('medium');
      try{tg.setBackgroundColor('#efefee');tg.setHeaderColor('#efefee');}catch(e){}
    }
    if(navigator.vibrate)navigator.vibrate(18);
    splash.style.transition='opacity .35s ease';
    splash.style.opacity='0';
    setTimeout(function(){
      splash.style.display='none';
      window.location.href='screen1.html';
    },400);
  }

  btn.addEventListener('click',function(e){e.preventDefault();goToScreen1();});
  btn.addEventListener('touchend',function(e){e.preventDefault();goToScreen1();},{passive:false});
})();
</script>

</body>
</html>
